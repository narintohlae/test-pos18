<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สมุดจดรายจ่าย (iOS Style)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-text-secondary: #8E8E93;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-separator: rgba(60, 60, 67, 0.15);
            --safe-area-top: 20px;
        }

        * {
            box-sizing: border-box;
            /* ใช้ฟอนต์ระบบของ Apple ก่อน ถ้าไม่มีให้ใช้ Sarabun */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Sarabun", sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .ios-app {
            width: 100%;
            max-width: 430px; /* ขนาดประมาณหน้าจอ iPhone Max */
            background: var(--ios-bg);
            position: relative;
            padding-bottom: 40px;
        }

        /* ------------------ Header & Balance ------------------ */
        .header {
            padding: var(--safe-area-top) 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .status {
            font-size: 13px;
            color: var(--ios-text-secondary);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .balance-card {
            background: #1C1C1E; /* บัตรสีดำสไตล์พรีเมียม */
            color: white;
            border-radius: 20px;
            margin: 10px 20px 24px;
            padding: 24px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .balance-label {
            font-size: 15px;
            color: #EBEBF5;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        /* ------------------ Input Section ------------------ */
        .input-container {
            margin: 0 20px 24px;
        }

        .input-wrapper {
            background-color: #E3E3E8;
            border-radius: 12px;
            padding: 2px;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 12px 14px;
            font-size: 17px;
            outline: none;
            color: var(--ios-text);
        }

        .input-wrapper input::placeholder {
            color: var(--ios-text-secondary);
        }

        .hint {
            display: block;
            font-size: 13px;
            color: var(--ios-text-secondary);
            margin-top: 8px;
            margin-left: 4px;
        }

        /* ------------------ Lists ------------------ */
        .expense-container {
            padding: 0 20px;
        }

        .ios-section {
            margin-bottom: 24px;
        }

        .ios-section-header {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-text-secondary);
            margin-bottom: 8px;
            margin-left: 12px;
            display: flex;
            justify-content: space-between;
            padding-right: 12px;
        }

        .ios-list {
            list-style: none;
            background: var(--ios-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .ios-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--ios-card);
            position: relative;
        }

        /* เส้นกั้นระหว่างรายการ (ไม่ให้มีเส้นที่อันสุดท้าย) */
        .ios-list-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 0;
            height: 1px;
            background-color: var(--ios-separator);
        }

        .item-info {
            display: flex;
            flex-direction: column;
        }

        .item-name {
            font-size: 17px;
            font-weight: 500;
        }

        .item-time {
            font-size: 13px;
            color: var(--ios-text-secondary);
            margin-top: 2px;
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-price {
            font-size: 17px;
            font-weight: 600;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--ios-separator);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: color 0.2s;
        }

        .delete-btn:active {
            color: var(--ios-red);
        }

        .delete-btn svg {
            width: 20px;
            height: 20px;
            pointer-events: none; /* เพื่อให้กดโดนตัวปุ่มเต็มๆ */
        }

        .empty-state {
            text-align: center;
            color: var(--ios-text-secondary);
            font-size: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="ios-app">
        <div class="header">
            <h1>รายจ่าย</h1>
            <span class="status" id="loadingStatus">กำลังโหลด...</span>
        </div>

        <div class="balance-card">
            <div class="balance-label">ยอดรวมทั้งหมด</div>
            <div class="balance-amount">฿<span id="totalAmount">0</span></div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="expenseInput" placeholder="พิมพ์รายการและราคา..." autocomplete="off" disabled>
            </div>
            <span class="hint">เว้นวรรคด้วยราคา เช่น ชาเย็น 45</span>
        </div>

        <div class="expense-container" id="expenseList">
            <!-- รายการจะถูกเพิ่มที่นี่ผ่าน JS -->
        </div>
    </div>

    <!-- Firebase JS SDK รูปแบบ Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAgTWrI1G1t3GYVz4-SPM7btrsixSe0el8",
            authDomain: "time-tracker-46283.firebaseapp.com",
            projectId: "time-tracker-46283",
            storageBucket: "time-tracker-46283.firebasestorage.app",
            messagingSenderId: "882533547295",
            appId: "1:882533547295:web:4b78bfc84322c58a50042a",
            measurementId: "G-5DPBNCSWFW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const expensesCol = collection(db, "expenses");

        let expenses = [];
        
        const inputEl = document.getElementById('expenseInput');
        const listEl = document.getElementById('expenseList');
        const totalEl = document.getElementById('totalAmount');
        const loadingEl = document.getElementById('loadingStatus');

        // ดึงข้อมูล Real-time
        const q = query(expensesCol, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            expenses = [];
            snapshot.forEach((doc) => {
                expenses.push({ id: doc.id, ...doc.data() });
            });
            renderExpenses();
            
            inputEl.disabled = false;
            loadingEl.innerText = 'เชื่อมต่อแล้ว';
            loadingEl.style.color = '#007AFF'; // iOS Blue
        }, (error) => {
            console.error("Error fetching data:", error);
            loadingEl.innerText = 'ออฟไลน์';
            loadingEl.style.color = '#FF3B30'; // iOS Red
        });

        // AI แยกชื่อรายการและราคา
        function aiParseExpense(text) {
            text = text.trim();
            const regex = /^(.*?)\s*(\d+(?:\.\d+)?)\s*(?:บาท|b|baht|฿)?$/i;
            const match = text.match(regex);

            if (match) {
                let itemName = match[1].trim();
                let itemPrice = parseFloat(match[2]);
                if (!itemName) itemName = "ไม่ระบุรายการ";
                return { name: itemName, price: itemPrice };
            }
            return null;
        }

        // เพิ่มรายการขึ้น Firestore
        async function addExpense() {
            const rawText = inputEl.value;
            if (!rawText) return;

            const parsedData = aiParseExpense(rawText);

            if (parsedData) {
                try {
                    inputEl.disabled = true;
                    await addDoc(expensesCol, {
                        name: parsedData.name,
                        price: parsedData.price,
                        createdAt: serverTimestamp()
                    });
                    inputEl.value = '';
                } catch (e) {
                    console.error("Error adding document: ", e);
                    alert("ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่");
                } finally {
                    inputEl.disabled = false;
                    inputEl.focus();
                }
            } else {
                alert("รูปแบบไม่ถูกต้อง ลองพิมพ์: 'ชาเย็น 45'");
            }
        }

        // ลบรายการ (ใช้ closest() เพื่อให้รองรับการกดโดนไอคอน SVG)
        listEl.addEventListener('click', async (e) => {
            const deleteBtn = e.target.closest('.delete-btn');
            if(deleteBtn) {
                if(confirm('ต้องการลบรายการนี้ใช่หรือไม่?')) {
                    const id = deleteBtn.getAttribute('data-id');
                    try {
                        await deleteDoc(doc(db, "expenses", id));
                    } catch (err) {
                        console.error("Error deleting document: ", err);
                    }
                }
            }
        });

        // จัดรูปแบบและแสดงผลสไตล์ iOS Grouped List
        function renderExpenses() {
            listEl.innerHTML = '';
            let totalAmountAll = 0;

            if (expenses.length === 0) {
                listEl.innerHTML = '<div class="empty-state">ยังไม่มีรายการจดบันทึก</div>';
                totalEl.innerText = "0";
                return;
            }

            const groupedData = {};
            
            expenses.forEach((exp) => {
                totalAmountAll += exp.price;
                
                let dateKey = "รอการอัปเดต..."; 
                let timeStr = "";
                
                if (exp.createdAt) {
                    const dateObj = exp.createdAt.toDate ? exp.createdAt.toDate() : new Date(exp.createdAt);
                    dateKey = dateObj.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
                    timeStr = dateObj.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                }

                if (!groupedData[dateKey]) {
                    groupedData[dateKey] = { items: [], totalDay: 0 };
                }
                
                groupedData[dateKey].items.push({...exp, timeStr});
                groupedData[dateKey].totalDay += exp.price;
            });

            for (const [date, data] of Object.entries(groupedData)) {
                // สร้าง Section ของแต่ละวัน
                const section = document.createElement('div');
                section.className = 'ios-section';

                // หัวข้อของวันนั้นๆ
                const header = document.createElement('div');
                header.className = 'ios-section-header';
                header.innerHTML = `
                    <span>${date}</span>
                    <span>รวม ${data.totalDay.toLocaleString()} ฿</span>
                `;
                section.appendChild(header);

                // กล่องรายการ (List)
                const ul = document.createElement('ul');
                ul.className = 'ios-list';

                data.items.forEach(exp => {
                    const li = document.createElement('li');
                    li.className = 'ios-list-item';
                    
                    // ไอคอนกากบาท (SVG แบบมินิมอล)
                    const svgIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;

                    li.innerHTML = `
                        <div class="item-info">
                            <span class="item-name">${exp.name}</span>
                            <span class="item-time">${exp.timeStr || '...'}</span>
                        </div>
                        <div class="item-right">
                            <span class="item-price">${exp.price.toLocaleString()} ฿</span>
                            <button class="delete-btn" data-id="${exp.id}">${svgIcon}</button>
                        </div>
                    `;
                    ul.appendChild(li);
                });

                section.appendChild(ul);
                listEl.appendChild(section);
            }

            totalEl.innerText = totalAmountAll.toLocaleString();
        }

        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addExpense();
            }
        });

    </script>
</body>
</html>
