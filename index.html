<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Checker - เช็คราคาสินค้า</title>
    <meta name="description" content="เช็คราคาสินค้าได้รวดเร็ว ทันใจ ผ่านระบบออนไลน์">
    <!-- Google Fonts: Outfit & Prompt for Thai -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- ZXing-js Library for barcode/QR scanning -->
    <script src="https://unpkg.com/@zxing/library@latest" type="text/javascript"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 0 0 7H6"></path>
                </svg>
                <span>Price Checker</span>
            </div>
        </header>

        <main>
            <div class="search-box glass">
                <h1>เช็คราคาสินค้า</h1>
                <p>พิมพ์ชื่อสินค้าหรือสแกนบาร์โค้ดเพื่อเริ่มตรวจสอบ</p>
                <div class="input-wrapper">
                    <input type="text" id="searchInput" placeholder="รหัสสินค้า / ชื่อสินค้า / บาร์โค้ด..." autocomplete="off">
                    <button id="scanBtn" class="secondary-btn" title="สแกนบาร์โค้ด">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                    </button>
                    <button id="searchBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                    <div id="searchSuggestions" class="suggestions-dropdown"></div>
                </div>
            </div>

            <div id="resultsContainer" class="results-container">
                <!-- Data will be injected here -->
                <div id="statusMessage" class="status-message">กำลังโหลดข้อมูล...</div>
            </div>

            <!-- Barcode Scanner Drawer -->
            <div id="scannerDrawer" class="scanner-drawer">
                <div class="drawer-header">
                    <h3>สแกนบาร์โค้ด</h3>
                    <button id="closeScanner" class="close-btn">&times;</button>
                </div>
                <div id="scannerView" class="scanner-view">
                    <video id="video" autoplay muted playsinline></video>
                    <div class="scanner-laser"></div>
                </div>
                <p class="scanner-tip">วางบาร์โค้ดให้อยู่ในกรอบเพื่อสแกน</p>
            </div>
            <div id="drawerOverlay" class="drawer-overlay"></div>
        </main>

        <footer>
            <p>&copy; 2024 Price Checker System</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
