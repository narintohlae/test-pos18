<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สมุดบัญชีรายรับ-รายจ่าย & POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-text-secondary: #8E8E93;
            --ios-blue: #007AFF;
            --ios-purple: #AF52DE;
            --ios-red: #FF3B30;
            --ios-green: #34C759;
            --ios-separator: rgba(60, 60, 67, 0.15);
            --safe-area-top: 20px;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Sarabun", sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .ios-app {
            width: 100%;
            max-width: 430px; 
            background: var(--ios-bg);
            position: relative;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
        }

        /* ------------------ Left Panel ------------------ */
        .left-panel {
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: var(--safe-area-top) 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .status {
            font-size: 13px;
            color: var(--ios-text-secondary);
            font-weight: 500;
            margin-bottom: 6px;
        }

        /* Balance Card */
        .balance-card {
            background: #1C1C1E;
            color: white;
            border-radius: 16px; 
            margin: 10px 20px 16px;
            padding: 16px 20px 16px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .balance-label {
            font-size: 14px; 
            color: #EBEBF5;
            opacity: 0.8;
            margin-bottom: 4px; 
            transition: all 0.3s ease;
        }

        .balance-amount {
            font-size: 30px; 
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px; 
        }

        /* Summary Grid for 4 types */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .summary-item.income { color: var(--ios-green); }
        .summary-item.pos1 { color: var(--ios-blue); }
        .summary-item.pos2 { color: var(--ios-purple); }
        .summary-item.expense { color: var(--ios-red); }
        
        .profit-label {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 2px;
            font-weight: 400;
        }

        .filter-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 9px;
            padding: 2px;
        }

        .filter-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #EBEBF5;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 0;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: #FFFFFF;
            color: #1C1C1E;
            font-weight: 600;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
        }

        /* Type Toggle (4 Tabs) */
        .type-toggle {
            display: flex;
            background: #E3E3E8;
            border-radius: 8px;
            padding: 2px;
            margin: 0 20px 16px;
        }

        .type-btn {
            flex: 1;
            padding: 8px 0;
            text-align: center;
            border-radius: 6px;
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--ios-text);
            transition: all 0.2s;
        }

        .type-btn.active {
            background: white;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }
        
        /* Active indicator colors for tabs */
        .type-btn[data-type="income"].active { color: var(--ios-green); }
        .type-btn[data-type="expense"].active { color: var(--ios-red); }
        .type-btn[data-type="pos1"].active { color: var(--ios-blue); }
        .type-btn[data-type="pos2"].active { color: var(--ios-purple); }

        .input-container {
            margin: 0 20px 24px;
        }

        .input-wrapper {
            background-color: #E3E3E8;
            border-radius: 12px;
            padding: 2px;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 12px 14px;
            font-size: 17px;
            outline: none;
            color: var(--ios-text);
        }

        .input-wrapper input::placeholder {
            color: var(--ios-text-secondary);
        }

        .hint {
            display: block;
            font-size: 13px;
            color: var(--ios-text-secondary);
            margin-top: 8px;
            margin-left: 4px;
        }

        /* ------------------ Right Panel (Lists) ------------------ */
        .right-panel {
            flex: 1;
        }

        .expense-container {
            padding: 0 20px;
        }

        .ios-section {
            margin-bottom: 24px;
        }

        .ios-section-header {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-text-secondary);
            margin-bottom: 8px;
            margin-left: 12px;
            display: flex;
            justify-content: space-between;
            padding-right: 12px;
        }

        .ios-list {
            list-style: none;
            background: var(--ios-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .ios-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--ios-card);
            position: relative;
        }

        .ios-list-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 0;
            height: 1px;
            background-color: var(--ios-separator);
        }

        .item-info {
            display: flex;
            flex-direction: column;
        }

        .item-name {
            font-size: 17px;
            font-weight: 500;
        }

        .item-time {
            font-size: 13px;
            color: var(--ios-text-secondary);
            margin-top: 2px;
        }
        
        .item-profit {
            color: var(--ios-green);
            font-weight: 500;
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-price {
            font-size: 17px;
            font-weight: 600;
        }
        
        .item-price.income { color: var(--ios-green); }
        .item-price.pos1 { color: var(--ios-blue); }
        .item-price.pos2 { color: var(--ios-purple); }
        .item-price.expense { color: var(--ios-text); } /* Default for expense */

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--ios-separator);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: color 0.2s;
        }

        .delete-btn:active {
            color: var(--ios-red);
        }

        .delete-btn svg {
            width: 20px;
            height: 20px;
            pointer-events: none;
        }

        .empty-state {
            text-align: center;
            color: var(--ios-text-secondary);
            font-size: 15px;
            margin-top: 40px;
        }

        /* ------------------ iPad & Desktop Layout ------------------ */
        @media (min-width: 768px) {
            .ios-app {
                max-width: 900px;
                flex-direction: row; 
                align-items: flex-start;
                padding-top: 40px;
                gap: 20px;
            }

            .left-panel {
                width: 380px;
                flex-shrink: 0;
                position: sticky; 
                top: 40px;
            }

            .header {
                padding-top: 0;
            }

            .right-panel {
                flex-grow: 1;
                padding-top: 5px; 
            }
        }
    </style>
</head>
<body>

    <div class="ios-app">
        <!-- ฝั่งซ้าย -->
        <div class="left-panel">
            <div class="header">
                <h1>บัญชี</h1>
                <span class="status" id="loadingStatus">กำลังเชื่อมต่อ...</span>
            </div>

            <div class="balance-card">
                <div class="balance-label" id="balanceLabel">ยอดเงินในลิ้นชัก (รวมสุทธิ) วันนี้</div>
                <div class="balance-amount">฿<span id="totalAmount">0</span></div>
                
                <div class="summary-grid">
                    <div class="summary-item income">
                        รับ: +<span id="summaryIncome">0</span>
                    </div>
                    <div class="summary-item expense">
                        จ่าย: -<span id="summaryExpense">0</span>
                    </div>
                    <div class="summary-item pos1">
                        POS1: +<span id="summaryPos1">0</span>
                        <div class="profit-label">กำไร: <span id="summaryPos1Profit">0</span></div>
                    </div>
                    <div class="summary-item pos2">
                        POS2: +<span id="summaryPos2">0</span>
                        <div class="profit-label">กำไร: <span id="summaryPos2Profit">0</span></div>
                    </div>
                </div>

                <div class="filter-tabs">
                    <button class="filter-btn active" data-filter="day">วันนี้</button>
                    <button class="filter-btn" data-filter="week">สัปดาห์นี้</button>
                    <button class="filter-btn" data-filter="month">เดือนนี้</button>
                    <button class="filter-btn" data-filter="all">ทั้งหมด</button>
                </div>
            </div>
            
            <div class="type-toggle">
                <button class="type-btn" data-type="income">รับทั่วไป</button>
                <button class="type-btn active" data-type="expense">รายจ่าย</button>
                <button class="type-btn" data-type="pos1">POS1</button>
                <button class="type-btn" data-type="pos2">POS2</button>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="expenseInput" placeholder="พิมพ์รายจ่ายและราคา..." autocomplete="off" autofocus>
                </div>
                <span class="hint" id="hintText">เว้นวรรคด้วยราคา เช่น ชาเย็น 45</span>
            </div>
        </div>

        <!-- ฝั่งขวา -->
        <div class="right-panel">
            <div class="expense-container" id="expenseList">
                <!-- รายการจะถูกเพิ่มที่นี่ผ่าน JS -->
            </div>
        </div>
    </div>

    <!-- Firebase JS SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ตั้งค่า Firebase
        const userFirebaseConfig = {
            apiKey: "AIzaSyAgTWrI1G1t3GYVz4-SPM7btrsixSe0el8",
            authDomain: "time-tracker-46283.firebaseapp.com",
            projectId: "time-tracker-46283",
            storageBucket: "time-tracker-46283.firebasestorage.app",
            messagingSenderId: "882533547295",
            appId: "1:882533547295:web:4b78bfc84322c58a50042a",
            measurementId: "G-5DPBNCSWFW"
        };
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let transactions = [];
        let currentFilter = 'day';
        let currentType = 'expense'; 
        let initialLoad = true;
        let unsubscribeSnapshot = null;
        
        const inputEl = document.getElementById('expenseInput');
        const hintTextEl = document.getElementById('hintText');
        const listEl = document.getElementById('expenseList');
        const totalEl = document.getElementById('totalAmount');
        const summaryIncomeEl = document.getElementById('summaryIncome');
        const summaryExpenseEl = document.getElementById('summaryExpense');
        const summaryPos1El = document.getElementById('summaryPos1');
        const summaryPos1ProfitEl = document.getElementById('summaryPos1Profit');
        const summaryPos2El = document.getElementById('summaryPos2');
        const summaryPos2ProfitEl = document.getElementById('summaryPos2Profit');
        
        const loadingEl = document.getElementById('loadingStatus');
        const balanceLabel = document.getElementById('balanceLabel');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const typeBtns = document.querySelectorAll('.type-btn');

        // จัดการ Filter วัน/สัปดาห์/เดือน
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-filter');
                
                const labelMap = {
                    'day': 'ยอดเงินในลิ้นชัก (รวมสุทธิ) วันนี้',
                    'week': 'ยอดเงินในลิ้นชัก (รวมสุทธิ) สัปดาห์นี้',
                    'month': 'ยอดเงินในลิ้นชัก (รวมสุทธิ) เดือนนี้',
                    'all': 'ยอดเงินในลิ้นชัก (รวมสุทธิ) ทั้งหมด'
                };
                balanceLabel.innerText = labelMap[currentFilter];
                renderTransactions();
            });
        });

        // จัดการ Tab 4 ประเภท เปลี่ยน Placeholder และคำแนะนำ
        typeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                typeBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                currentType = e.target.getAttribute('data-type');
                
                if (currentType === 'income') {
                    inputEl.placeholder = "พิมพ์รายการรับ และราคา...";
                    hintTextEl.innerText = "เว้นวรรคด้วยราคา เช่น เงินทอน 500";
                } else if (currentType === 'expense') {
                    inputEl.placeholder = "พิมพ์รายการจ่าย และราคา...";
                    hintTextEl.innerText = "เว้นวรรคด้วยราคา เช่น ค่าไฟ 1200";
                } else if (currentType === 'pos1') {
                    inputEl.placeholder = "ยอดขาย กำไร...";
                    hintTextEl.innerText = "พิมพ์ ยอดขาย และ กำไร (เว้นวรรค) เช่น 1500 300";
                } else if (currentType === 'pos2') {
                    inputEl.placeholder = "ยอดขาย กำไร...";
                    hintTextEl.innerText = "พิมพ์ ยอดขาย และ กำไร (เว้นวรรค) เช่น 1500 300";
                }
                
                renderTransactions();
                inputEl.focus();
            });
        });

        const getExpensesCollection = () => {
            if (typeof __firebase_config !== 'undefined') {
                return collection(db, 'artifacts', appId, 'users', currentUser.uid, 'expenses');
            }
            return collection(db, "expenses");
        };

        const getExpenseDoc = (id) => {
            if (typeof __firebase_config !== 'undefined') {
                return doc(db, 'artifacts', appId, 'users', currentUser.uid, 'expenses', id);
            }
            return doc(db, "expenses", id);
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                loadingEl.innerText = 'ออฟไลน์';
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                const expensesCol = getExpensesCollection();
                
                unsubscribeSnapshot = onSnapshot(expensesCol, (snapshot) => {
                    transactions = [];
                    snapshot.forEach((doc) => {
                        transactions.push({ id: doc.id, ...doc.data() });
                    });
                    
                    transactions.sort((a, b) => {
                        const timeA = a.createdAt && a.createdAt.toDate ? a.createdAt.toDate().getTime() : Date.now();
                        const timeB = b.createdAt && b.createdAt.toDate ? b.createdAt.toDate().getTime() : Date.now();
                        return timeB - timeA;
                    });

                    renderTransactions();
                    
                    loadingEl.innerText = 'เชื่อมต่อแล้ว';
                    loadingEl.style.color = '#007AFF';

                    if (initialLoad) {
                        inputEl.focus();
                        initialLoad = false;
                    }

                }, (error) => {
                    console.error("Error fetching data:", error);
                    loadingEl.innerText = 'ออฟไลน์';
                    loadingEl.style.color = '#FF3B30';
                });
            } else {
                if (unsubscribeSnapshot) unsubscribeSnapshot();
            }
        });

        initAuth();

        // ตัวช่วยดึงข้อมูลสำหรับ รับทั่วไป / รายจ่าย
        function parseNormalInput(text) {
            text = text.trim();
            const regex = /^(.*?)\s*(\d+(?:\.\d+)?)\s*(?:บาท|b|baht|฿)?$/i;
            const match = text.match(regex);
            if (match) {
                let itemName = match[1].trim() || "ไม่ระบุรายการ";
                let itemPrice = parseFloat(match[2]);
                return { name: itemName, price: itemPrice, profit: 0 };
            }
            return null;
        }

        // ตัวช่วยดึงข้อมูลสำหรับ POS1 / POS2 (รับแค่ตัวเลขยอดขาย และกำไร)
        function parsePosInput(text) {
            const parts = text.trim().split(/\s+/);
            if (parts.length >= 2) {
                const sales = parseFloat(parts[0]);
                const profit = parseFloat(parts[1]);
                if (!isNaN(sales) && !isNaN(profit)) {
                    return { name: "ยอดขายประจำวัน", price: sales, profit: profit };
                }
            } else if (parts.length === 1) {
                const sales = parseFloat(parts[0]);
                if (!isNaN(sales)) {
                    return { name: "ยอดขายประจำวัน", price: sales, profit: 0 };
                }
            }
            return null;
        }

        async function addTransaction() {
            if (!currentUser) return;
            const rawText = inputEl.value;
            if (!rawText) return;

            let parsedData = null;
            if (currentType === 'pos1' || currentType === 'pos2') {
                parsedData = parsePosInput(rawText);
            } else {
                parsedData = parseNormalInput(rawText);
            }

            if (parsedData) {
                inputEl.value = '';

                try {
                    const expensesCol = getExpensesCollection();
                    await addDoc(expensesCol, {
                        name: parsedData.name,
                        price: parsedData.price,
                        profit: parsedData.profit || 0, // บันทึกกำไรด้วยถ้ามี
                        type: currentType,
                        createdAt: serverTimestamp()
                    });
                } catch (e) {
                    console.error("Error adding document: ", e);
                    console.warn("ไม่สามารถบันทึกข้อมูลได้");
                    if(inputEl.value === '') inputEl.value = rawText; 
                } finally {
                    inputEl.focus(); 
                }
            } else {
                const originalPlaceholder = inputEl.placeholder;
                inputEl.value = '';
                
                if (currentType === 'pos1' || currentType === 'pos2') {
                    inputEl.placeholder = "ผิดรูปแบบ! พิมพ์ ยอดขายและกำไร (เช่น 1500 300)";
                } else {
                    inputEl.placeholder = "ผิดรูปแบบ! พิมพ์รายการและราคา (เช่น น้ำ 15)";
                }
                
                setTimeout(() => {
                    inputEl.placeholder = originalPlaceholder;
                    inputEl.value = rawText;
                }, 2000);
            }
        }

        listEl.addEventListener('click', async (e) => {
            const deleteBtn = e.target.closest('.delete-btn');
            if(deleteBtn && currentUser) {
                const id = deleteBtn.getAttribute('data-id');
                try {
                    await deleteDoc(getExpenseDoc(id));
                } catch (err) {
                    console.error("Error deleting document: ", err);
                }
            }
        });

        function isSameWeek(dateStr1, dateStr2) {
            const d1 = new Date(dateStr1);
            const d2 = new Date(dateStr2);
            d1.setHours(0,0,0,0);
            d2.setHours(0,0,0,0);
            
            const diff = d1.getDate() - d1.getDay(); 
            const startOfWeek1 = new Date(d1.setDate(diff));
            const diff2 = d2.getDate() - d2.getDay();
            const startOfWeek2 = new Date(d2.setDate(diff2));
            return startOfWeek1.getTime() === startOfWeek2.getTime();
        }

        function renderTransactions() {
            listEl.innerHTML = '';
            let totalIncome = 0;
            let totalExpense = 0;
            let totalPos1Sales = 0, totalPos1Profit = 0;
            let totalPos2Sales = 0, totalPos2Profit = 0;
            
            const now = new Date();

            // 1. กรองข้อมูลตามช่วงเวลา
            const timeFilteredData = transactions.filter(exp => {
                const expDate = exp.createdAt && exp.createdAt.toDate ? exp.createdAt.toDate() : new Date();

                if (currentFilter === 'day') {
                    return expDate.toDateString() === now.toDateString();
                } else if (currentFilter === 'week') {
                    return isSameWeek(expDate, now);
                } else if (currentFilter === 'month') {
                    return expDate.getMonth() === now.getMonth() && expDate.getFullYear() === now.getFullYear();
                }
                return true; 
            });

            // 2. คำนวณสรุปยอด 4 ประเภท และกำไร
            timeFilteredData.forEach(exp => {
                const type = exp.type || 'expense';
                const price = exp.price || 0;
                const profit = exp.profit || 0;
                
                if (type === 'income') {
                    totalIncome += price;
                } else if (type === 'pos1') {
                    totalPos1Sales += price;
                    totalPos1Profit += profit;
                } else if (type === 'pos2') {
                    totalPos2Sales += price;
                    totalPos2Profit += profit;
                } else {
                    totalExpense += price;
                }
            });

            // อัปเดตตัวเลขสรุปใน UI
            summaryIncomeEl.innerText = totalIncome.toLocaleString();
            summaryExpenseEl.innerText = totalExpense.toLocaleString();
            
            summaryPos1El.innerText = totalPos1Sales.toLocaleString();
            summaryPos1ProfitEl.innerText = totalPos1Profit.toLocaleString();
            
            summaryPos2El.innerText = totalPos2Sales.toLocaleString();
            summaryPos2ProfitEl.innerText = totalPos2Profit.toLocaleString();

            // ยอดคงเหลือสุทธิ (เงินเข้าลิ้นชัก) = (รายรับ + ยอดขาย POS1 + ยอดขาย POS2) - รายจ่าย
            const netBalance = (totalIncome + totalPos1Sales + totalPos2Sales) - totalExpense;
            totalEl.innerText = netBalance.toLocaleString();

            // 3. กรองข้อมูลที่จะแสดงใน List ตาม Tab ปัจจุบัน
            const listData = timeFilteredData.filter(exp => {
                const type = exp.type || 'expense';
                return type === currentType;
            });

            if (listData.length === 0) {
                let emptyText = 'รายการ';
                if (currentType === 'income') emptyText = 'รายรับ';
                else if (currentType === 'expense') emptyText = 'รายจ่าย';
                else if (currentType === 'pos1') emptyText = 'ยอดขาย POS1';
                else if (currentType === 'pos2') emptyText = 'ยอดขาย POS2';
                
                listEl.innerHTML = `<div class="empty-state">ไม่มี${emptyText}ในช่วงเวลานี้</div>`;
                return;
            }

            // 4. จัดกลุ่มข้อมูลตามวันที่
            const groupedData = {};
            
            listData.forEach((exp) => {
                const expDate = exp.createdAt && exp.createdAt.toDate ? exp.createdAt.toDate() : new Date();
                const dateKey = expDate.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
                const timeStr = expDate.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

                if (!groupedData[dateKey]) {
                    groupedData[dateKey] = { items: [], totalDay: 0 };
                }
                
                groupedData[dateKey].items.push({...exp, timeStr});
                groupedData[dateKey].totalDay += exp.price;
            });

            // 5. สร้าง HTML รายการ
            for (const [date, data] of Object.entries(groupedData)) {
                const section = document.createElement('div');
                section.className = 'ios-section';

                const header = document.createElement('div');
                header.className = 'ios-section-header';
                header.innerHTML = `
                    <span>${date}</span>
                    <span>รวมยอด ${data.totalDay.toLocaleString()} ฿</span>
                `;
                section.appendChild(header);

                const ul = document.createElement('ul');
                ul.className = 'ios-list';

                data.items.forEach(exp => {
                    const li = document.createElement('li');
                    li.className = 'ios-list-item';
                    
                    const svgIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                    
                    let priceClass = 'item-price';
                    let prefix = '';
                    let subText = exp.timeStr || '...';
                    
                    if (exp.type === 'income') { priceClass += ' income'; prefix = '+'; }
                    else if (exp.type === 'pos1') { priceClass += ' pos1'; prefix = '+'; }
                    else if (exp.type === 'pos2') { priceClass += ' pos2'; prefix = '+'; }
                    else { priceClass += ' expense'; prefix = '-'; }

                    // ถ้าเป็น POS ให้แสดงกำไรข้างใต้ชื่อรายการ
                    if ((exp.type === 'pos1' || exp.type === 'pos2') && exp.profit > 0) {
                        subText += ` <span class="item-profit">• กำไร ${exp.profit.toLocaleString()} ฿</span>`;
                    }

                    li.innerHTML = `
                        <div class="item-info">
                            <span class="item-name">${exp.name}</span>
                            <span class="item-time">${subText}</span>
                        </div>
                        <div class="item-right">
                            <span class="${priceClass}">${prefix}${exp.price.toLocaleString()} ฿</span>
                            <button class="delete-btn" data-id="${exp.id}">${svgIcon}</button>
                        </div>
                    `;
                    ul.appendChild(li);
                });

                section.appendChild(ul);
                listEl.appendChild(section);
            }
        }

        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTransaction();
            }
        });

    </script>
</body>
</html>
