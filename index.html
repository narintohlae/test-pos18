<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- ป้องกันการ Cache หน้าเว็บหลักเบื้องต้น -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Note Wallet</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลดไอคอนจาก Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* ซ่อน Scrollbar ให้ดูสะอาดตาแบบ Apple */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ป้องกันข้อความเด้งตอนกดบนมือถือ */
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#f5f5f7] text-[#1d1d1f] font-sans selection:bg-gray-200 p-0 sm:p-4 md:p-8 lg:p-12 flex justify-center items-center min-h-screen">

    <!-- Toast Notification สำหรับอัปเดตแอป (GitHub Pages) -->
    <div id="update-toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 translate-y-24 opacity-0 bg-[#1d1d1f]/95 backdrop-blur-md text-white px-5 py-3.5 rounded-full shadow-2xl flex items-center gap-4 z-[200] transition-all duration-500 pointer-events-none w-[90%] max-w-sm">
        <div class="flex-1 text-[0.95rem] font-medium flex items-center gap-2">
            <i data-lucide="sparkles" class="w-4 h-4 text-yellow-400"></i> มีอัปเดตแอปเวอร์ชันใหม่
        </div>
        <button onclick="forceRefresh()" class="bg-blue-500 hover:bg-blue-600 text-white text-[0.85rem] font-semibold px-4 py-2 rounded-full transition-colors pointer-events-auto shadow-sm active:scale-95">
            รีเฟรชเลย
        </button>
        <button onclick="closeUpdateToast()" class="text-gray-400 hover:text-white p-1 pointer-events-auto transition-colors">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
    </div>

    <div class="w-full h-[100dvh] max-w-lg md:max-w-2xl lg:max-w-3xl sm:h-[90vh] md:h-[85vh] sm:rounded-[2.5rem] bg-white sm:shadow-[0_20px_40px_rgba(0,0,0,0.08)] overflow-hidden flex flex-col relative border border-gray-100 transition-all">
        
        <!-- Modal แก้ไขรายการ (แท็กและเวลา) -->
        <div id="edit-modal" class="hidden absolute inset-0 z-[100] bg-black/20 backdrop-blur-sm flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-xs md:max-w-sm rounded-3xl shadow-2xl p-6 md:p-8 transition-all transform scale-100">
                <div class="flex justify-between items-center mb-4 md:mb-6">
                    <h3 class="font-semibold text-base sm:text-lg md:text-xl">แก้ไขรายการ</h3>
                    <button onclick="closeEditModal()" class="text-gray-400 hover:text-black focus:outline-none">
                        <i data-lucide="x" class="w-5 h-5 md:w-6 md:h-6"></i>
                    </button>
                </div>
                
                <div class="mb-3 md:mb-4">
                    <label class="block text-xs font-medium text-gray-500 mb-1 ml-1">แท็ก</label>
                    <input 
                        id="edit-tag-input"
                        type="text" 
                        placeholder="ชื่อแท็ก..."
                        class="w-full bg-[#f5f5f7] px-4 py-2.5 sm:py-3 rounded-xl outline-none text-[0.95rem] sm:text-[1rem]"
                        onkeydown="if(event.key === 'Enter') saveEdit()"
                    />
                </div>

                <div class="mb-5 md:mb-6">
                    <label class="block text-xs font-medium text-gray-500 mb-1 ml-1">วันเวลา</label>
                    <input 
                        id="edit-datetime-input"
                        type="datetime-local" 
                        class="w-full bg-[#f5f5f7] px-4 py-2.5 sm:py-3 rounded-xl outline-none text-[0.95rem] sm:text-[1rem]"
                        onkeydown="if(event.key === 'Enter') saveEdit()"
                    />
                </div>

                <button 
                    onclick="saveEdit()"
                    class="w-full bg-black text-white py-2.5 sm:py-3 md:py-3.5 rounded-xl font-medium active:scale-95 transition-all text-[0.95rem] sm:text-[1rem] md:text-[1.1rem]"
                >
                    บันทึกการแก้ไข
                </button>
            </div>
        </div>

        <!-- Header -->
        <header class="flex-none bg-white/90 backdrop-blur-md pt-8 sm:pt-10 md:pt-12 pb-3 sm:pb-4 md:pb-5 px-4 sm:px-6 md:px-10 border-b border-gray-100/80 z-20 transition-all shadow-sm">
            <div class="flex flex-row justify-between items-start gap-2">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-0.5 sm:mb-1 md:mb-2">
                        <p class="text-[0.65rem] sm:text-xs md:text-sm font-medium tracking-wide text-gray-500 uppercase truncate">ยอดเงินคงเหลือ</p>
                        <span id="cloud-wrapper"><i data-lucide="cloud-off" class="w-3 h-3 md:w-4 md:h-4 text-gray-300 animate-pulse"></i></span>
                    </div>
                    <h1 class="text-3xl sm:text-4xl md:text-5xl font-medium tracking-tight text-[#1d1d1f] leading-none mt-1 md:mt-2 truncate">
                        <span id="balance-display">0</span>
                        <span class="text-xl sm:text-2xl md:text-3xl text-gray-400 font-normal ml-0.5 sm:ml-1 md:ml-2 tracking-normal">฿</span>
                    </h1>
                    <div class="flex flex-wrap gap-2 sm:gap-3 md:gap-4 mt-2.5 sm:mt-3 md:mt-4">
                        <div class="flex items-center gap-1 text-[0.7rem] sm:text-[0.8rem] md:text-[0.9rem] font-medium text-green-600 bg-green-50 px-2 py-1 md:px-3 md:py-1.5 rounded-md md:rounded-lg whitespace-nowrap">
                            <i data-lucide="trending-up" class="w-3 h-3 sm:w-3.5 sm:h-3.5 md:w-4 md:h-4"></i> รับ <span id="income-display">0</span>
                        </div>
                        <div class="flex items-center gap-1 text-[0.7rem] sm:text-[0.8rem] md:text-[0.9rem] font-medium text-red-500 bg-red-50 px-2 py-1 md:px-3 md:py-1.5 rounded-md md:rounded-lg whitespace-nowrap">
                            <i data-lucide="trending-down" class="w-3 h-3 sm:w-3.5 sm:h-3.5 md:w-4 md:h-4"></i> จ่าย <span id="expense-display">0</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex shrink-0 self-start bg-[#f5f5f7] p-1 rounded-lg sm:rounded-xl md:rounded-2xl border border-gray-200/50">
                    <button id="tab-list" onclick="switchTab('list')" class="flex items-center justify-center gap-1.5 px-2.5 py-1 sm:px-3 sm:py-1.5 md:px-4 md:py-2 text-xs sm:text-sm md:text-base rounded-md sm:rounded-lg md:rounded-xl transition-all bg-white shadow-sm font-medium text-black">
                        <i data-lucide="list" class="w-3.5 h-3.5 sm:w-[15px] sm:h-[15px] md:w-[18px] md:h-[18px]"></i> รายการ
                    </button>
                    <button id="tab-daily" onclick="switchTab('daily')" class="flex items-center justify-center gap-1.5 px-2.5 py-1 sm:px-3 sm:py-1.5 md:px-4 md:py-2 text-xs sm:text-sm md:text-base rounded-md sm:rounded-lg md:rounded-xl transition-all text-gray-500 hover:text-gray-700">
                        <i data-lucide="calendar-days" class="w-3.5 h-3.5 sm:w-[15px] sm:h-[15px] md:w-[18px] md:h-[18px]"></i> รายวัน
                    </button>
                </div>
            </div>

            <div id="category-container" class="flex gap-2 overflow-x-auto w-full mt-3 sm:mt-4 md:mt-5 pb-2 no-scrollbar">
                <!-- เนื้อหาหมวดหมู่จะถูกแทรกที่นี่ -->
            </div>
        </header>

        <!-- Input Area (Moved to Top) -->
        <section class="flex-none bg-white/95 backdrop-blur-md border-b border-gray-100 p-3 sm:p-4 md:p-6 z-20 shadow-sm">
            <div class="flex items-end gap-2 bg-[#f5f5f7] p-1 sm:p-1.5 md:p-2 rounded-[1.25rem] md:rounded-[1.5rem] border border-gray-200/50 focus-within:border-gray-300 focus-within:bg-[#ebebed] transition-all">
                <textarea
                    id="input-text"
                    disabled
                    placeholder="กำลังเชื่อมต่อ..."
                    class="flex-1 bg-transparent px-3 py-2 sm:px-4 sm:py-2.5 md:px-5 md:py-3 text-[0.95rem] sm:text-[1.05rem] md:text-[1.15rem] outline-none font-normal resize-none min-h-[40px] sm:min-h-[44px] md:min-h-[50px] max-h-[120px] sm:max-h-[150px] md:max-h-[200px] overflow-y-auto leading-relaxed disabled:opacity-50 no-scrollbar"
                    rows="1"
                ></textarea>
                <button
                    id="submit-btn"
                    disabled
                    onclick="submitEntries()"
                    class="p-2 md:p-3 mb-0.5 mr-0.5 rounded-full transition-all duration-200 flex items-center justify-center shrink-0 bg-gray-200 text-gray-400"
                >
                    <span id="submit-wrapper"><i data-lucide="arrow-up" class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6"></i></span>
                </button>
            </div>
        </section>

        <!-- Main Content -->
        <!-- เพิ่ม pb-12 เผื่อพื้นที่ด้านล่างสุดของจอให้เลื่อนสุดได้พอดี -->
        <main id="main-content" class="flex-1 overflow-y-auto px-4 sm:px-6 md:px-10 py-4 md:py-6 pb-12 sm:pb-16 flex flex-col scroll-smooth relative z-0 bg-white">
            <div class="flex-1 flex items-center justify-center">
                <i data-lucide="loader-2" class="w-6 h-6 sm:w-8 sm:h-8 md:w-10 md:h-10 animate-spin text-gray-300"></i>
            </div>
        </main>

    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // *** เปลี่ยนตัวเลขเวอร์ชันนี้ทุกครั้งที่คุณอัปเดตโค้ดบน GitHub ***
        // เช่น ครั้งหน้าเปลี่ยนเป็น "1.0.2" เพื่อบังคับให้มือถือของผู้ใช้รีเฟรชอัปเดตใหม่
        const APP_VERSION = "1.0.1";

        // คอนฟิกูเรชันจาก Firebase ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyAgTWrI1G1t3GYVz4-SPM7btrsixSe0el8",
            authDomain: "time-tracker-46283.firebaseapp.com",
            projectId: "time-tracker-46283",
            storageBucket: "time-tracker-46283.firebasestorage.app",
            messagingSenderId: "882533547295",
            appId: "1:882533547295:web:4b78bfc84322c58a50042a",
            measurementId: "G-5DPBNCSWFW"
        };
            
        const appIdString = typeof __app_id !== 'undefined' ? __app_id : 'html-note-wallet';

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) {
            console.error("Firebase Init Error", e);
        }

        let user = null;
        let entries = [];
        let activeTab = 'list';
        let taggingEntryId = null;
        let isSyncing = false;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenError) {
                        console.warn("Token mismatch (using custom Firebase config). Falling back to anonymous auth.");
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        };
        if(auth) initAuth();

        onAuthStateChanged(auth, (currentUser) => {
            user = currentUser;
            const input = document.getElementById('input-text');
            const cloudWrapper = document.getElementById('cloud-wrapper');
            
            if (user) {
                input.disabled = false;
                input.placeholder = "จดบันทึก...";
                if (cloudWrapper) {
                    cloudWrapper.innerHTML = '<i data-lucide="cloud" class="w-3 h-3 text-blue-500"></i>';
                }
                lucide.createIcons();
                fetchData();
            }
        });

        const fetchData = () => {
            if (!user) return;
            const entriesCollection = collection(db, 'artifacts', appIdString, 'users', user.uid, 'entries');
            
            onSnapshot(entriesCollection, (snapshot) => {
                // เรียงจาก ใหม่ล่าสุด -> เก่าสุด (b.timestamp - a.timestamp) 
                entries = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data(),
                    timestamp: doc.data().timestamp?.toDate() || new Date()
                })).sort((a, b) => b.timestamp - a.timestamp);
                
                renderUI();
            }, (error) => {
                console.error("Firestore error:", error);
            });
        };

        const getCategory = (text, type) => {
            const t = text.toLowerCase();
            if (type === 'income') {
                if (/เงินเดือน|โบนัส|ค่าจ้าง|ot/.test(t)) return { name: 'รายได้' };
                if (/คืน|ได้|ถูกหวย|โชค/.test(t)) return { name: 'รับอื่นๆ' };
                return { name: 'รายรับ' };
            }
            if (/ข้าว|น้ำ|ขนม|อาหาร|กาแฟ|ชา|กิน|ชาบู|หมูกระทะ|ลูกชิ้น|ไข่|เนื้อ|ผัก/.test(t)) return { name: 'อาหาร' };
            if (/รถ|เดินทาง|bts|mrt|วิน|แท็กซี่|น้ำมัน|เรือ|เครื่องบิน/.test(t)) return { name: 'เดินทาง' };
            if (/เสื้อ|กางเกง|รองเท้า|กระเป๋า|ช้อป|ซื้อ|shopee|lazada|ของใช้/.test(t)) return { name: 'ช้อปปิ้ง' };
            if (/ไฟ|น้ำ|เน็ต|โทร|บิล|ค่าเช่า|ห้อง|หอ/.test(t)) return { name: 'บิล' };
            if (/ยา|หมอ|โรงพยาบาล|คลินิก/.test(t)) return { name: 'สุขภาพ' };
            return { name: 'อื่นๆ' };
        };

        const parseEntry = (text) => {
            const cleanText = text.replace(/,/g, '');
            const numberMatch = cleanText.match(/([+-]?\d+(?:\.\d+)?)/);
            if (!numberMatch) return null;

            let amountStr = numberMatch[0];
            let amount = parseFloat(amountStr);
            let type = 'expense';
            const lowerText = text.toLowerCase();

            if (amountStr.startsWith('+') || lowerText.includes('รับ') || lowerText.includes('ได้') || lowerText.includes('เงินเดือน')) {
                type = 'income';
                amount = Math.abs(amount);
            } else {
                type = 'expense';
                amount = Math.abs(amount);
            }

            let description = text.replace(numberMatch[0], '').trim();
            description = description.replace(/^[+-]\s*/, '').trim();
            if (!description) description = type === 'income' ? 'รายรับ' : 'รายการไม่มีชื่อ';

            const category = getCategory(description, type);
            return { amount, description, category, type };
        };

        const renderUI = () => {
            const totals = entries.reduce((acc, curr) => {
                if (curr.amount) {
                    if (curr.type === 'income') acc.income += curr.amount;
                    else acc.expense += curr.amount;
                }
                return acc;
            }, { income: 0, expense: 0 });

            document.getElementById('balance-display').innerText = (totals.income - totals.expense).toLocaleString();
            document.getElementById('income-display').innerText = totals.income.toLocaleString();
            document.getElementById('expense-display').innerText = totals.expense.toLocaleString();

            const categorySummary = entries.reduce((acc, curr) => {
                if (curr.amount && curr.category) {
                    const catName = curr.category.name;
                    if (!acc[catName]) acc[catName] = { amount: 0, type: curr.type };
                    acc[catName].amount += curr.amount;
                }
                return acc;
            }, {});

            const catContainer = document.getElementById('category-container');
            if (Object.keys(categorySummary).length > 0) {
                // เรียงยอดสูงสุดไปต่ำสุด
                const sortedCats = Object.entries(categorySummary).sort((a, b) => b[1].amount - a[1].amount);
                catContainer.innerHTML = sortedCats.map(([cat, data]) => `
                    <div class="border rounded-lg px-2 py-1 sm:px-2.5 sm:py-1.5 md:px-3 md:py-2 flex items-center gap-1 sm:gap-1.5 md:gap-2 whitespace-nowrap shadow-sm ${data.type === 'income' ? 'bg-green-50/50 border-green-100 text-green-600' : 'bg-[#f5f5f7] border-gray-200/60 text-gray-600'}">
                        <span class="text-[0.7rem] sm:text-[0.75rem] md:text-[0.85rem] font-medium">${cat}</span>
                        <span class="text-[0.7rem] sm:text-[0.75rem] md:text-[0.85rem] font-semibold ml-0.5 ${data.type === 'income' ? 'text-green-600' : 'text-[#1d1d1f]'}">
                            ${data.type === 'income' ? '+' : ''}${data.amount.toLocaleString()}฿
                        </span>
                    </div>
                `).join('');
                catContainer.style.display = 'flex';
            } else {
                catContainer.style.display = 'none';
            }

            const mainContent = document.getElementById('main-content');
            if (activeTab === 'list') {
                if (entries.length === 0) {
                    mainContent.innerHTML = `<div class="mt-8 text-gray-400 text-xs sm:text-sm md:text-base font-light text-center">ยังไม่มีข้อมูล<br><span class="text-[10px] md:text-xs mt-2 block">พิมพ์รายการที่ช่องด้านบนเพื่อเริ่มต้น</span></div>`;
                } else {
                    mainContent.innerHTML = `<div class="flex flex-col gap-3 sm:gap-4 md:gap-5 mt-1 sm:mt-2 md:mt-3 fade-in">` + entries.map(entry => `
                        <div class="flex justify-between items-center group border-b border-gray-50/80 pb-2.5 sm:pb-3 md:pb-4 select-none touch-none active:bg-gray-50/50 rounded-lg px-2 -mx-2 transition-colors"
                             onpointerdown="startPress('${entry.id}', '${entry.customTag || ''}', '${entry.timestamp.toISOString()}')"
                             onpointerup="cancelPress()"
                             onpointerleave="cancelPress()">
                            <div class="flex flex-col flex-1">
                                <div class="flex items-center flex-wrap gap-1.5 sm:gap-2">
                                    <span class="text-[0.95rem] sm:text-[1.05rem] md:text-[1.15rem] text-[#1d1d1f] font-normal tracking-wide break-words">${entry.description}</span>
                                    ${entry.customTag ? `<span class="text-[0.6rem] sm:text-[0.65rem] md:text-[0.75rem] px-1 sm:px-1.5 md:px-2 py-0.5 rounded bg-blue-50 text-blue-600 font-bold border border-blue-100 uppercase tracking-tight">${entry.customTag}</span>` : ''}
                                    ${entry.category ? `<span class="text-[0.6rem] sm:text-[0.65rem] md:text-[0.75rem] px-1 sm:px-1.5 md:px-2 py-0.5 rounded uppercase font-bold tracking-tighter ${entry.type === 'income' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}">${entry.category.name}</span>` : ''}
                                </div>
                                <span class="text-[0.6rem] sm:text-[0.65rem] md:text-[0.75rem] text-gray-400 mt-0.5 sm:mt-1 flex items-center gap-2">
                                    ${entry.timestamp.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                    <span class="md:opacity-0 md:group-hover:opacity-100 text-[9px] sm:text-[10px] md:text-[11px] italic transition-opacity text-gray-300 hidden sm:inline">กดค้างเพื่อแก้ไขแท็ก/เวลา</span>
                                </span>
                            </div>
                            <div class="flex items-center gap-2 sm:gap-3 md:gap-4 pl-2 sm:pl-4 md:pl-6">
                                ${entry.amount !== null ? `<div class="text-[0.95rem] sm:text-[1.05rem] md:text-[1.15rem] font-medium tracking-wide ${entry.type === 'income' ? 'text-green-600' : 'text-[#1d1d1f]'}">${entry.type === 'income' ? '+' : ''}${entry.amount.toLocaleString()}</div>` : ''}
                                <button onclick="deleteEntry('${entry.id}', event)" class="text-gray-300 hover:text-red-500 hover:bg-red-50 p-1 sm:p-1.5 md:p-2 rounded-lg transition-all duration-200">
                                    <i data-lucide="trash-2" class="w-4 h-4 sm:w-[18px] sm:h-[18px] md:w-5 md:h-5"></i>
                                </button>
                            </div>
                        </div>
                    `).join('') + `</div>`;
                    
                    // เลื่อนหน้าจอไปอยู่บนสุด (ให้เห็นรายการใหม่ทันที)
                    setTimeout(() => {
                        const mainContentDiv = document.getElementById('main-content');
                        if(mainContentDiv) mainContentDiv.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 100);
                }
            } else {
                const dailyMap = new Map();
                entries.forEach(curr => {
                    if (curr.amount) {
                        const dateKey = curr.timestamp.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
                        if (!dailyMap.has(dateKey)) dailyMap.set(dateKey, { income: 0, expense: 0, count: 0, rawDate: curr.timestamp });
                        const existing = dailyMap.get(dateKey);
                        if (curr.type === 'income') existing.income += curr.amount;
                        else existing.expense += curr.amount;
                        existing.count += 1;
                    }
                });

                let summaryArray = Array.from(dailyMap.entries()).map(([date, data]) => ({ date, ...data })).sort((a, b) => a.rawDate - b.rawDate);
                let runningBalance = 0;
                summaryArray = summaryArray.map(day => {
                    runningBalance += (day.income - day.expense);
                    return { ...day, balance: runningBalance };
                }).reverse();

                if (summaryArray.length === 0) {
                    mainContent.innerHTML = `<div class="mt-8 text-gray-400 text-xs sm:text-sm md:text-base font-light text-center">ยังไม่มีข้อมูลรายวัน</div>`;
                } else {
                    mainContent.innerHTML = `
                    <div class="mt-1 sm:mt-2 md:mt-4">
                        <div class="border border-gray-100 rounded-xl sm:rounded-2xl md:rounded-[1.5rem] overflow-hidden shadow-sm bg-white mb-6 sm:mb-8">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-[#f5f5f7] border-b border-gray-100 text-gray-500 text-[0.75rem] sm:text-[0.85rem] md:text-[0.95rem]">
                                    <tr>
                                        <th class="py-2.5 sm:py-3 md:py-4 px-2 sm:px-4 md:px-6 font-medium">วันที่</th>
                                        <th class="py-2.5 sm:py-3 md:py-4 px-1 sm:px-2 md:px-4 font-medium text-right text-green-600">รับ</th>
                                        <th class="py-2.5 sm:py-3 md:py-4 px-1 sm:px-2 md:px-4 font-medium text-right text-red-500">จ่าย</th>
                                        <th class="py-2.5 sm:py-3 md:py-4 px-2 sm:px-4 md:px-6 font-medium text-right text-blue-600">คงเหลือ</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50">
                                    ${summaryArray.map(day => `
                                        <tr class="hover:bg-gray-50/50 transition-colors">
                                            <td class="py-2.5 sm:py-3.5 md:py-4 px-2 sm:px-4 md:px-6 text-[0.8rem] sm:text-[0.95rem] md:text-[1.05rem] text-[#1d1d1f] whitespace-nowrap">
                                                ${day.date}<span class="block text-[0.65rem] sm:text-[0.7rem] md:text-[0.8rem] text-gray-400 mt-0.5 sm:mt-1">${day.count} รายการ</span>
                                            </td>
                                            <td class="py-2.5 sm:py-3.5 md:py-4 px-1 sm:px-2 md:px-4 text-[0.85rem] sm:text-[1rem] md:text-[1.1rem] font-medium text-green-600 text-right">${day.income > 0 ? `+${day.income.toLocaleString()}` : '-'}</td>
                                            <td class="py-2.5 sm:py-3.5 md:py-4 px-1 sm:px-2 md:px-4 text-[0.85rem] sm:text-[1rem] md:text-[1.1rem] font-medium text-red-500 text-right">${day.expense > 0 ? `-${day.expense.toLocaleString()}` : '-'}</td>
                                            <td class="py-2.5 sm:py-3.5 md:py-4 px-2 sm:px-4 md:px-6 text-[0.9rem] sm:text-[1.05rem] md:text-[1.15rem] font-semibold text-[#1d1d1f] text-right">${day.balance.toLocaleString()}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                    
                    setTimeout(() => {
                        const mainContentDiv = document.getElementById('main-content');
                        if(mainContentDiv) mainContentDiv.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 100);
                }
            }

            lucide.createIcons();
        };

        window.submitEntries = async () => {
            const input = document.getElementById('input-text');
            const text = input.value.trim();
            if (!text || !user) return;
            
            isSyncing = true;
            toggleLoading(true);
            
            // แยกบรรทัดจากล่างขึ้นบน เพื่อให้บรรทัดแรกที่พิมพ์อยู่บนสุด (ใหม่สุด) เมื่อเรียงด้วย Timestamp
            const lines = text.split('\n').filter(line => line.trim() !== '').reverse();
            const entriesCollection = collection(db, 'artifacts', appIdString, 'users', user.uid, 'entries');

            try {
                for (const line of lines) {
                    const parsedData = parseEntry(line);
                    await addDoc(entriesCollection, {
                        description: parsedData ? parsedData.description : line,
                        amount: parsedData ? parsedData.amount : null,
                        category: parsedData ? parsedData.category : null,
                        type: parsedData ? parsedData.type : 'note',
                        timestamp: new Date(),
                        customTag: ''
                    });
                }
                input.value = '';
                input.style.height = 'auto';
                checkInput();
            } catch (error) {
                console.error("Submit error:", error);
            } finally {
                isSyncing = false;
                toggleLoading(false);
            }
        };

        window.deleteEntry = async (id, event) => {
            event.stopPropagation();
            if (!user) return;
            try {
                const docRef = doc(db, 'artifacts', appIdString, 'users', user.uid, 'entries', id);
                await deleteDoc(docRef);
            } catch (error) {
                console.error("Delete error:", error);
            }
        };

        const activeTabClass = "flex items-center justify-center gap-1.5 px-2.5 py-1 sm:px-3 sm:py-1.5 md:px-4 md:py-2 text-xs sm:text-sm md:text-base rounded-md sm:rounded-lg md:rounded-xl transition-all bg-white shadow-sm font-medium text-black";
        const inactiveTabClass = "flex items-center justify-center gap-1.5 px-2.5 py-1 sm:px-3 sm:py-1.5 md:px-4 md:py-2 text-xs sm:text-sm md:text-base rounded-md sm:rounded-lg md:rounded-xl transition-all text-gray-500 hover:text-gray-700";

        window.switchTab = (tab) => {
            activeTab = tab;
            const btnList = document.getElementById('tab-list');
            const btnDaily = document.getElementById('tab-daily');
            
            if(tab === 'list') {
                btnList.className = activeTabClass;
                btnDaily.className = inactiveTabClass;
            } else {
                btnDaily.className = activeTabClass;
                btnList.className = inactiveTabClass;
            }
            renderUI();
        };

        const inputEl = document.getElementById('input-text');
        const submitBtn = document.getElementById('submit-btn');
        
        window.checkInput = () => {
            const hasText = inputEl.value.trim().length > 0;
            if (hasText && !isSyncing) {
                submitBtn.disabled = false;
                submitBtn.className = "p-2 md:p-3 mb-0.5 mr-0.5 rounded-full transition-all duration-200 flex items-center justify-center shrink-0 bg-black text-white active:scale-90";
            } else {
                submitBtn.disabled = true;
                submitBtn.className = "p-2 md:p-3 mb-0.5 mr-0.5 rounded-full transition-all duration-200 flex items-center justify-center shrink-0 bg-gray-200 text-gray-400";
            }
        };
        inputEl.addEventListener('input', function() {
            this.style.height = 'auto';
            const maxHeight = window.innerWidth >= 768 ? 200 : 120;
            this.style.height = Math.min(this.scrollHeight, maxHeight) + 'px';
            checkInput();
        });
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                e.preventDefault();
                window.submitEntries();
            }
        });

        const toggleLoading = (loading) => {
            const wrapper = document.getElementById('submit-wrapper');
            if (loading) {
                wrapper.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 sm:w-5 sm:h-5 animate-spin"></i>';
            } else {
                wrapper.innerHTML = '<i data-lucide="arrow-up" class="w-4 h-4 sm:w-5 sm:h-5"></i>';
            }
            lucide.createIcons();
            inputEl.disabled = loading;
        }

        let longPressTimer;
        window.startPress = (id, currentTag, isoString) => {
            longPressTimer = setTimeout(() => {
                taggingEntryId = id;
                document.getElementById('edit-tag-input').value = currentTag || '';
                
                // จัดการรูปแบบวันที่ให้อยู่ในฟอร์แมต YYYY-MM-DDThh:mm เพื่อให้แสดงผลใน input datetime-local ได้พอดี
                if (isoString) {
                    const dateObj = new Date(isoString);
                    const tzOffset = dateObj.getTimezoneOffset() * 60000;
                    const localISOTime = (new Date(dateObj - tzOffset)).toISOString().slice(0, 16);
                    document.getElementById('edit-datetime-input').value = localISOTime;
                }

                document.getElementById('edit-modal').classList.remove('hidden');
                setTimeout(() => document.getElementById('edit-tag-input').focus(), 100);
                if (navigator.vibrate) navigator.vibrate(50);
            }, 600);
        };
        window.cancelPress = () => {
            clearTimeout(longPressTimer);
        };
        window.closeEditModal = () => {
            document.getElementById('edit-modal').classList.add('hidden');
            taggingEntryId = null;
        };
        window.saveEdit = async () => {
            if (!user || !taggingEntryId) return;
            
            const newTag = document.getElementById('edit-tag-input').value.trim();
            const newDateTimeStr = document.getElementById('edit-datetime-input').value;
            
            closeEditModal();
            
            try {
                const docRef = doc(db, 'artifacts', appIdString, 'users', user.uid, 'entries', taggingEntryId);
                const updateData = { customTag: newTag };
                
                // หากมีการระบุวันเวลาใหม่ ให้อัปเดต timestamp ด้วย
                if (newDateTimeStr) {
                    updateData.timestamp = new Date(newDateTimeStr);
                }
                
                await updateDoc(docRef, updateData);
            } catch (e) {
                console.error("Save edit error:", e);
            }
        };

        // --- ระบบแจ้งเตือนอัปเดตสำหรับ GitHub Pages ---
        window.showUpdateToast = () => {
            const toast = document.getElementById('update-toast');
            toast.classList.remove('translate-y-24', 'opacity-0', 'pointer-events-none');
        };

        window.closeUpdateToast = () => {
            const toast = document.getElementById('update-toast');
            toast.classList.add('translate-y-24', 'opacity-0', 'pointer-events-none');
        };

        window.forceRefresh = () => {
            window.location.reload(true); 
        };

        const checkForUpdates = async () => {
            try {
                const cacheBuster = new Date().getTime();
                const response = await fetch(window.location.href.split('?')[0] + '?v=' + cacheBuster, {
                    cache: 'no-store' 
                });
                const htmlText = await response.text();
                
                const versionMatch = htmlText.match(/const\s+APP_VERSION\s*=\s*['"]([^'"]+)['"]/);
                
                if (versionMatch && versionMatch[1]) {
                    const serverVersion = versionMatch[1];
                    if (serverVersion !== APP_VERSION) {
                        showUpdateToast();
                    }
                }
            } catch (err) {
                console.log("Update check failed (might be offline)", err);
            }
        };

        setTimeout(checkForUpdates, 2000);

        lucide.createIcons();

    </script>
</body>
</html>
