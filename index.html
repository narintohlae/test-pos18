<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมุดจดรายจ่าย AI (Firebase)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #fdd835;
            --bg-color: #f4f4f9;
            --paper-color: #fff;
            --text-color: #333;
            --line-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .notepad {
            width: 100%;
            max-width: 420px;
            background: var(--paper-color);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 10px;
        }

        .header {
            background: var(--primary-color);
            padding: 15px 20px;
            font-weight: 600;
            font-size: 1.2rem;
            color: #424242;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-section {
            padding: 15px 20px;
            background: #fffdf2;
            border-bottom: 2px dashed #ccc;
        }

        .input-section input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        .input-section input:focus {
            border-color: #fbc02d;
        }

        .hint {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
        }

        .expense-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 50vh;
            overflow-y: auto;
            background: var(--paper-color);
        }

        /* ส่วนหัวของแต่ละวัน */
        .date-header {
            background: #f0f0f0;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            border-top: 1px solid #ddd;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px dashed var(--line-color);
        }

        .item-text {
            flex-grow: 1;
            font-size: 16px;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }
        
        .item-time {
            font-size: 0.75rem;
            color: #999;
            margin-top: 2px;
        }

        .item-price {
            font-weight: 600;
            color: #d32f2f;
            margin: 0 15px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff5252;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .summary {
            background: #333;
            color: #fff;
            padding: 15px 20px;
            text-align: right;
            font-size: 1.2rem;
        }

        .summary span {
            font-weight: 600;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="notepad">
        <div class="header">
            <span>📝 สมุดจดรายจ่าย</span>
            <span id="loadingStatus" style="font-size: 0.8rem; font-weight: normal; color: #666;">กำลังโหลด...</span>
        </div>
        
        <div class="input-section">
            <input type="text" id="expenseInput" placeholder="เช่น ชาเย็น 20 หรือ ค่ารถ 50" autocomplete="off" disabled>
            <span class="hint">💡 พิมพ์รายการเว้นวรรคด้วยราคา แล้วกด Enter</span>
        </div>

        <ul class="expense-list" id="expenseList">
            <!-- รายการจะถูกเพิ่มที่นี่ -->
        </ul>

        <div class="summary">
            รวมทั้งหมด: <span id="totalAmount">0</span> บาท
        </div>
    </div>

    <!-- ใช้ Firebase JS SDK รูปแบบ Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            onSnapshot, 
            deleteDoc, 
            doc, 
            query, 
            orderBy, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // 1. ตั้งค่า Firebase Configuration ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyAgTWrI1G1t3GYVz4-SPM7btrsixSe0el8",
            authDomain: "time-tracker-46283.firebaseapp.com",
            projectId: "time-tracker-46283",
            storageBucket: "time-tracker-46283.firebasestorage.app",
            messagingSenderId: "882533547295",
            appId: "1:882533547295:web:4b78bfc84322c58a50042a",
            measurementId: "G-5DPBNCSWFW"
        };

        // 2. Initialize Firebase และ Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const expensesCol = collection(db, "expenses");

        // ตัวแปรเก็บข้อมูล
        let expenses = [];
        
        // Element ต่างๆ
        const inputEl = document.getElementById('expenseInput');
        const listEl = document.getElementById('expenseList');
        const totalEl = document.getElementById('totalAmount');
        const loadingEl = document.getElementById('loadingStatus');

        // 3. ดึงข้อมูลแบบ Real-time (เรียงตามเวลาที่สร้างล่าสุดขึ้นก่อน)
        const q = query(expensesCol, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            expenses = [];
            snapshot.forEach((doc) => {
                expenses.push({ id: doc.id, ...doc.data() });
            });
            renderExpenses();
            
            // ปลดล็อคช่องพิมพ์เมื่อโหลดเสร็จ
            inputEl.disabled = false;
            loadingEl.innerText = 'ออนไลน์ 🟢';
        }, (error) => {
            console.error("Error fetching data:", error);
            loadingEl.innerText = 'ออฟไลน์ 🔴';
            loadingEl.style.color = 'red';
        });

        // 4. ฟังก์ชันจำลอง AI แยกชื่อรายการและราคา
        function aiParseExpense(text) {
            text = text.trim();
            const regex = /^(.*?)\s*(\d+(?:\.\d+)?)\s*(?:บาท|b|baht|฿)?$/i;
            const match = text.match(regex);

            if (match) {
                let itemName = match[1].trim();
                let itemPrice = parseFloat(match[2]);
                if (!itemName) itemName = "ไม่ระบุรายการ";
                return { name: itemName, price: itemPrice };
            }
            return null;
        }

        // 5. ฟังก์ชันเพิ่มรายการขึ้น Firestore
        async function addExpense() {
            const rawText = inputEl.value;
            if (!rawText) return;

            const parsedData = aiParseExpense(rawText);

            if (parsedData) {
                try {
                    // กำลังบันทึก ปิดช่องพิมพ์ชั่วคราว
                    inputEl.disabled = true;
                    await addDoc(expensesCol, {
                        name: parsedData.name,
                        price: parsedData.price,
                        createdAt: serverTimestamp() // ให้ Server ของ Firebase บันทึกเวลาอัตโนมัติ
                    });
                    inputEl.value = '';
                } catch (e) {
                    console.error("Error adding document: ", e);
                    alert("ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่");
                } finally {
                    inputEl.disabled = false;
                    inputEl.focus();
                }
            } else {
                alert("AI ไม่เข้าใจรูปแบบครับ ลองพิมพ์แบบนี้ดูนะ: 'ชาเย็น 20'");
            }
        }

        // 6. ฟังก์ชันลบรายการจาก Firestore
        async function deleteExpense(id) {
            if(confirm('คุณต้องการลบรายการนี้ใช่หรือไม่?')) {
                try {
                    await deleteDoc(doc(db, "expenses", id));
                } catch (e) {
                    console.error("Error deleting document: ", e);
                }
            }
        }

        // ฟังชันก์ลบที่ผูกกับ Event Delegation (เพราะเราเขียนแบบ Module ทำให้ html เรียก onclick ตรงๆ ไม่ได้)
        listEl.addEventListener('click', (e) => {
            if(e.target.classList.contains('delete-btn')) {
                const id = e.target.getAttribute('data-id');
                deleteExpense(id);
            }
        });

        // 7. จัดกลุ่มข้อมูลตามวันที่และแสดงผล (สรุปรายจ่าย)
        function renderExpenses() {
            listEl.innerHTML = '';
            let totalAmountAll = 0;

            if (expenses.length === 0) {
                listEl.innerHTML = '<div class="empty-state">ยังไม่มีรายการจดบันทึก ลองพิมพ์ด้านบนเลย!</div>';
                totalEl.innerText = "0";
                return;
            }

            // จัดกลุ่มข้อมูลตามวันที่
            const groupedData = {};
            
            expenses.forEach((exp) => {
                totalAmountAll += exp.price;
                
                // แปลง Timestamp ของ Firebase เป็นวันที่ของไทย
                let dateKey = "รอการอัปเดต..."; 
                let timeStr = "";
                
                if (exp.createdAt) {
                    const dateObj = exp.createdAt.toDate ? exp.createdAt.toDate() : new Date(exp.createdAt);
                    // รูปแบบ: 15 พ.ค. 2567
                    dateKey = dateObj.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
                    // รูปแบบ: 14:30 น.
                    timeStr = dateObj.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';
                }

                if (!groupedData[dateKey]) {
                    groupedData[dateKey] = { items: [], totalDay: 0 };
                }
                
                groupedData[dateKey].items.push({...exp, timeStr});
                groupedData[dateKey].totalDay += exp.price;
            });

            // วนลูปสร้าง HTML จากข้อมูลที่จัดกลุ่มแล้ว
            for (const [date, data] of Object.entries(groupedData)) {
                // สร้างส่วนหัวของวันที่และสรุปรายวัน
                const headerLi = document.createElement('li');
                headerLi.className = 'date-header';
                headerLi.innerHTML = `
                    <span>📅 ${date}</span>
                    <span>รวม: ${data.totalDay.toLocaleString()} ฿</span>
                `;
                listEl.appendChild(headerLi);

                // สร้างรายการย่อยในแต่ละวัน
                data.items.forEach(exp => {
                    const li = document.createElement('li');
                    li.className = 'expense-item';
                    li.innerHTML = `
                        <div class="item-text">
                            ${exp.name}
                            <span class="item-time">${exp.timeStr || '...'}</span>
                        </div>
                        <div class="item-price">${exp.price.toLocaleString()} ฿</div>
                        <button class="delete-btn" data-id="${exp.id}">×</button>
                    `;
                    listEl.appendChild(li);
                });
            }

            // อัปเดตยอดรวมทั้งหมด
            totalEl.innerText = totalAmountAll.toLocaleString();
        }

        // ดักจับการกดปุ่ม Enter
        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addExpense();
            }
        });

    </script>
</body>
</html>
