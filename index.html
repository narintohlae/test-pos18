<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สมุดบัญชีรายรับ-รายจ่าย & POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-text-secondary: #8E8E93;
            --ios-blue: #007AFF;
            --ios-purple: #AF52DE;
            --ios-red: #FF3B30;
            --ios-green: #34C759;
            --ios-separator: rgba(60, 60, 67, 0.15);
            --safe-area-top: 20px;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Sarabun", sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .ios-app {
            width: 100%;
            max-width: 430px; 
            background: var(--ios-bg);
            position: relative;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
        }

        /* ------------------ Left Panel ------------------ */
        .left-panel {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 80px); /* เผื่อพื้นที่ให้ Tab Bar ด้านล่าง */
            min-height: calc(100dvh - 80px); /* รองรับมือถือเวลามีคีย์บอร์ดหรือแถบ URL */
        }

        .header {
            padding: var(--safe-area-top) 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .status {
            font-size: 13px;
            color: var(--ios-text-secondary);
            font-weight: 500;
            margin-bottom: 6px;
        }

        /* Balance Card */
        .balance-card {
            background: #1C1C1E;
            color: white;
            border-radius: 16px; 
            margin: 10px 20px 16px;
            padding: 16px 20px 16px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .balance-label {
            font-size: 14px; 
            color: #EBEBF5;
            opacity: 0.8;
            margin-bottom: 4px; 
            transition: all 0.3s ease;
        }

        .balance-amount {
            font-size: 30px; 
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 16px; 
        }

        .filter-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 9px;
            padding: 2px;
        }

        .filter-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #EBEBF5;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 0;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: #FFFFFF;
            color: #1C1C1E;
            font-weight: 600;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
        }

        /* ------------------ Summary Table ------------------ */
        .summary-table-card {
            background: var(--ios-card);
            border-radius: 12px;
            margin: 0 20px 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
        }

        .summary-table td {
            padding: 12px 16px;
            font-size: 15px;
            position: relative;
        }

        .summary-table tr:not(:last-child) td::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 0;
            height: 1px;
            background-color: var(--ios-separator);
        }

        .summary-table td:first-child {
            color: var(--ios-text);
        }

        .summary-table td:last-child {
            text-align: right;
            font-weight: 600;
        }

        .summary-table .profit-text {
            font-size: 12px;
            color: var(--ios-text-secondary);
            display: block;
            margin-top: 2px;
            font-weight: 400;
        }

        .summary-table tr.total-row {
            background-color: #F8F8F8;
        }

        .summary-table tr.total-row td {
            font-weight: 600;
            font-size: 15px;
        }

        .summary-table .income { color: var(--ios-green); }
        .summary-table .expense { color: var(--ios-red); }
        .summary-table .pos1 { color: var(--ios-blue); }
        .summary-table .pos2 { color: var(--ios-purple); }

        /* Type Toggle (4 Tabs) */
        .type-toggle {
            display: flex;
            background: #E3E3E8;
            border-radius: 8px;
            padding: 2px;
            margin: 0 20px 16px;
        }

        .type-btn {
            flex: 1;
            padding: 8px 0;
            text-align: center;
            border-radius: 6px;
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--ios-text);
            transition: all 0.2s;
        }

        .type-btn.active {
            background: white;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }
        
        .type-btn[data-type="income"].active { color: var(--ios-green); }
        .type-btn[data-type="expense"].active { color: var(--ios-red); }
        .type-btn[data-type="pos1"].active { color: var(--ios-blue); }
        .type-btn[data-type="pos2"].active { color: var(--ios-purple); }

        .input-container {
            margin: 0 20px 24px;
            margin-top: auto; /* คำสั่งหลักที่ใช้ดันช่องพิมพ์ลงไปด้านล่างสุด */
        }

        .input-wrapper {
            background-color: #E3E3E8;
            border-radius: 12px;
            padding: 2px;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 12px 14px;
            font-size: 17px;
            outline: none;
            color: var(--ios-text);
        }

        .input-wrapper input::placeholder {
            color: var(--ios-text-secondary);
        }

        .hint {
            display: block;
            font-size: 13px;
            color: var(--ios-text-secondary);
            margin-top: 8px;
            margin-left: 4px;
        }

        /* ------------------ Right Panel (Lists) ------------------ */
        .right-panel {
            flex: 1;
        }

        .expense-container {
            padding: 0 20px;
        }

        .ios-section {
            margin-bottom: 24px;
        }

        .ios-section-header {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-text-secondary);
            margin-bottom: 8px;
            margin-left: 12px;
            display: flex;
            justify-content: space-between;
            padding-right: 12px;
        }

        .ios-list {
            list-style: none;
            background: var(--ios-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .ios-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--ios-card);
            position: relative;
        }

        .ios-list-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 0;
            height: 1px;
            background-color: var(--ios-separator);
        }

        .item-info {
            display: flex;
            flex-direction: column;
        }

        .item-name {
            font-size: 17px;
            font-weight: 500;
        }

        .item-time {
            font-size: 13px;
            color: var(--ios-text-secondary);
            margin-top: 2px;
        }
        
        .item-profit {
            color: var(--ios-green);
            font-weight: 500;
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-price {
            font-size: 17px;
            font-weight: 600;
        }
        
        .item-price.income { color: var(--ios-green); }
        .item-price.pos1 { color: var(--ios-blue); }
        .item-price.pos2 { color: var(--ios-purple); }
        .item-price.expense { color: var(--ios-text); } 

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--ios-separator);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: color 0.2s;
        }

        .delete-btn:active {
            color: var(--ios-red);
        }

        .delete-btn svg {
            width: 20px;
            height: 20px;
            pointer-events: none;
        }

        .edit-btn {
            background: transparent;
            border: none;
            color: var(--ios-blue);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: color 0.2s;
        }

        .edit-btn:active {
            opacity: 0.5;
        }

        .edit-btn svg {
            width: 18px;
            height: 18px;
            pointer-events: none;
        }

        /* ------------------ Modal Styles ------------------ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-card {
            background: var(--ios-card);
            width: 90%;
            max-width: 320px;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal-overlay.show .modal-card {
            transform: scale(1);
        }
        .modal-card h3 {
            margin-bottom: 16px;
            text-align: center;
            font-size: 17px;
        }
        .modal-field {
            margin-bottom: 12px;
        }
        .modal-field label {
            display: block;
            font-size: 13px;
            color: var(--ios-text-secondary);
            margin-bottom: 4px;
        }
        .modal-field input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--ios-separator);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background: #F2F2F7;
            color: var(--ios-text);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn.cancel {
            background: #E3E3E8;
            color: var(--ios-text);
        }
        .modal-btn.save {
            background: var(--ios-blue);
            color: white;
        }

        .empty-state {
            text-align: center;
            color: var(--ios-text-secondary);
            font-size: 15px;
            margin-top: 40px;
        }

        /* ------------------ Daily Summary Table ------------------ */
        .view-toggle-container {
            padding: 0 20px;
            margin-bottom: 16px;
        }

        .daily-table-wrapper {
            background: var(--ios-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin: 0 20px 24px;
        }

        .daily-table {
            width: 100%;
            border-collapse: collapse;
        }

        .daily-table th, .daily-table td {
            padding: 12px 10px;
            text-align: right;
            font-size: 14px;
            border-bottom: 1px solid var(--ios-separator);
        }

        .daily-table th {
            background: #F8F8F8;
            font-weight: 600;
            color: var(--ios-text-secondary);
            font-size: 13px;
        }

        .daily-table th:first-child, .daily-table td:first-child {
            text-align: left;
            padding-left: 16px;
        }

        .daily-table th:last-child, .daily-table td:last-child {
            padding-right: 16px;
        }

        .daily-table tr:last-child td {
            border-bottom: none;
        }

        .daily-table .net-positive { color: var(--ios-green); font-weight: 600; }
        .daily-table .net-negative { color: var(--ios-red); font-weight: 600; }
        .daily-table .profit-hint {
            display: block;
            font-size: 11px;
            color: var(--ios-text-secondary);
            margin-top: 2px;
            font-weight: 400;
        }

        /* ------------------ Mobile Page Logic & Tab Bar ------------------ */
        .page {
            display: none;
            width: 100%;
            animation: fadeIn 0.25s ease-out;
        }
        
        .page.active {
            display: block;
        }
        
        .left-panel.page.active {
            display: flex; /* รักษาคุณสมบัติ flex ของฝั่งซ้าย */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bottom-tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(242, 242, 247, 0.85); /* var(--ios-bg) */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--ios-separator);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
            z-index: 1000;
        }

        .tab-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--ios-text-secondary);
            font-size: 10px;
            font-weight: 500;
            gap: 4px;
            cursor: pointer;
            width: 70px;
            transition: color 0.2s;
        }

        .tab-btn.active {
            color: var(--ios-blue);
        }

        .tab-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* เพิ่มพื้นที่ด้านล่างเผื่อ Tab Bar บนมือถือ */
        .ios-app {
            padding-bottom: 80px;
        }

        /* ------------------ iPad & Desktop Layout ------------------ */
        @media (min-width: 768px) {
            .ios-app {
                max-width: 900px;
                flex-direction: row; 
                align-items: flex-start;
                padding-top: 40px;
                padding-bottom: 40px;
                gap: 20px;
            }

            /* ยกเลิกระบบ Page บนหน้าจอใหญ่ ให้แสดงพร้อมกัน */
            .page {
                display: block !important;
                animation: none;
            }
            .left-panel.page {
                display: flex !important;
            }
            .bottom-tab-bar {
                display: none !important; /* ซ่อน Tab Bar บน Desktop */
            }

            .left-panel {
                width: 380px;
                flex-shrink: 0;
                position: sticky; 
                top: 40px;
                height: calc(100vh - 80px); /* กำหนดความสูงตายตัวสำหรับหน้าจอใหญ่เพื่อให้ดันลงล่างได้ */
                overflow-y: auto;
            }
            
            .left-panel::-webkit-scrollbar { display: none; }
            .left-panel { -ms-overflow-style: none; scrollbar-width: none; }

            .header {
                padding-top: 0;
            }

            .right-panel {
                flex-grow: 1;
                padding-top: 5px; 
            }
        }
    </style>
</head>
<body>

    <div class="ios-app">
        <!-- ฝั่งซ้าย (หน้า 1: บันทึก) -->
        <div class="left-panel page active" id="pageHome">
            <div class="header">
                <h1>บัญชี</h1>
                <span class="status" id="loadingStatus">กำลังเชื่อมต่อ...</span>
            </div>
            
            <!-- Type Tabs แก้ไข ID เพื่อให้ผูก Event ได้ง่าย -->
            <div class="type-toggle" id="entryTypeToggle">
                <button class="type-btn" data-type="income">รับอื่นๆ</button>
                <button class="type-btn active" data-type="expense">รายจ่าย</button>
                <button class="type-btn" data-type="pos1">POS1</button>
                <button class="type-btn" data-type="pos2">POS2</button>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="expenseInput" placeholder="พิมพ์รายจ่ายและราคา..." autocomplete="off" autofocus>
                </div>
                <span class="hint" id="hintText">เว้นวรรคด้วยราคา เช่น ค่าไฟ 1200</span>
            </div>
        </div>

        <!-- ฝั่งขวา (หน้า 2: รายการ/ประวัติ) -->
        <div class="right-panel page" id="pageHistory">
            
            <!-- ย้ายการ์ดมาไว้ที่นี่ -->
            <div class="balance-card" style="margin-top: calc(var(--safe-area-top) + 10px);">
                <div class="balance-label" id="balanceLabel">ยอดเงินคงเหลือสุทธิ (วันนี้)</div>
                <div class="balance-amount">฿<span id="totalAmount">0</span></div>

                <div class="filter-tabs">
                    <button class="filter-btn active" data-filter="day">วันนี้</button>
                    <button class="filter-btn" data-filter="week">สัปดาห์นี้</button>
                    <button class="filter-btn" data-filter="month">เดือนนี้</button>
                    <button class="filter-btn" data-filter="all">ทั้งหมด</button>
                </div>
            </div>

            <div class="view-toggle-container">
                <div class="type-toggle" style="margin: 0;">
                    <button class="type-btn view-btn active" data-view="list">📝 รายการ</button>
                    <button class="type-btn view-btn" data-view="summary">📊 สรุปรายวัน</button>
                </div>
            </div>
            
            <div class="expense-container" id="expenseList">
                <!-- รายการจะถูกเพิ่มที่นี่ผ่าน JS -->
            </div>

            <div id="dailySummaryContainer" style="display: none;">
                <!-- ตารางสรุปรายวันจะถูกสร้างที่นี่ -->
            </div>
        </div>

        <!-- Bottom Tab Bar (เฉพาะหน้าจอมือถือ) -->
        <nav class="bottom-tab-bar">
            <button class="tab-btn active" data-target="pageHome">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>บันทึก</span>
            </button>
            <button class="tab-btn" data-target="pageHistory">
                <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                <span>รายการ</span>
            </button>
        </nav>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-card">
            <h3>แก้ไขรายการ</h3>
            <div class="modal-field">
                <label>ชื่อรายการ</label>
                <input type="text" id="editName">
            </div>
            <div class="modal-field">
                <label>ราคา/ยอดเงิน</label>
                <input type="number" id="editPrice" step="0.01">
            </div>
            <div class="modal-field" id="editProfitField" style="display:none;">
                <label>กำไร</label>
                <input type="number" id="editProfit" step="0.01">
            </div>
            <div class="modal-field">
                <label>วัน-เวลา</label>
                <input type="datetime-local" id="editDatetime">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="cancelEditBtn">ยกเลิก</button>
                <button class="modal-btn save" id="saveEditBtn">บันทึก</button>
            </div>
        </div>
    </div>

    <!-- Firebase JS SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, updateDoc, Timestamp
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ตั้งค่า Firebase - รองรับ Canvas Environment
        const userFirebaseConfig = {
            apiKey: "AIzaSyAgTWrI1G1t3GYVz4-SPM7btrsixSe0el8",
            authDomain: "time-tracker-46283.firebaseapp.com",
            projectId: "time-tracker-46283",
            storageBucket: "time-tracker-46283.firebasestorage.app",
            messagingSenderId: "882533547295",
            appId: "1:882533547295:web:4b78bfc84322c58a50042a",
            measurementId: "G-5DPBNCSWFW"
        };
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let transactions = [];
        let currentFilter = 'day';
        let currentType = 'expense'; 
        let currentView = 'list';
        let initialLoad = true;
        let unsubscribeSnapshot = null;
        
        const inputEl = document.getElementById('expenseInput');
        const hintTextEl = document.getElementById('hintText');
        const listEl = document.getElementById('expenseList');
        const totalEl = document.getElementById('totalAmount');
        
        const dailySummaryContainer = document.getElementById('dailySummaryContainer');
        const viewBtns = document.querySelectorAll('.view-btn');

        const loadingEl = document.getElementById('loadingStatus');
        const balanceLabel = document.getElementById('balanceLabel');
        const filterBtns = document.querySelectorAll('.filter-btn');
        
        // Modal Elements
        const editModal = document.getElementById('editModal');
        const editName = document.getElementById('editName');
        const editPrice = document.getElementById('editPrice');
        const editProfit = document.getElementById('editProfit');
        const editProfitField = document.getElementById('editProfitField');
        const editDatetime = document.getElementById('editDatetime');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const saveEditBtn = document.getElementById('saveEditBtn');
        let editingId = null;

        // ปุ่มสลับประเภท รายรับ/รายจ่าย/POS (เฉพาะกลุ่มซ้ายมือ)
        const entryTypeBtns = document.querySelectorAll('#entryTypeToggle .type-btn');

        // ระบบนำทาง (Tab Bar) สำหรับมือถือ
        const navTabs = document.querySelectorAll('.bottom-tab-bar .tab-btn');
        const pages = document.querySelectorAll('.page');

        navTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // ล้างสถานะ active เดิม
                navTabs.forEach(t => t.classList.remove('active'));
                pages.forEach(p => p.classList.remove('active'));

                // ตั้งสถานะ active ให้ tab ที่ถูกคลิก
                tab.classList.add('active');

                // แสดงหน้าที่เลือก
                const targetId = tab.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        // ฟังก์ชันจัดการ Filter วัน/สัปดาห์/เดือน
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-filter');
                
                const labelMap = {
                    'day': 'ยอดเงินคงเหลือสุทธิ (วันนี้)',
                    'week': 'ยอดเงินคงเหลือสุทธิ (สัปดาห์นี้)',
                    'month': 'ยอดเงินคงเหลือสุทธิ (เดือนนี้)',
                    'all': 'ยอดเงินคงเหลือสุทธิ (ทั้งหมด)'
                };
                balanceLabel.innerText = labelMap[currentFilter];
                renderTransactions();
            });
        });

        // จัดการ Tab สลับประเภท (ส่วนที่เพิ่มเข้ามาให้ใช้งานได้)
        entryTypeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                entryTypeBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentType = e.target.getAttribute('data-type');
                
                // อัปเดต Placeholder และ Hint Text ตามประเภทที่เลือก
                if (currentType === 'pos1' || currentType === 'pos2') {
                    inputEl.placeholder = `พิมพ์ยอดขาย ${currentType.toUpperCase()} และกำไร...`;
                    hintTextEl.innerText = "เว้นวรรค เช่น: ยอดขาย 1500 กำไร 300 (พิมพ์ 1500 300)";
                } else if (currentType === 'income') {
                    inputEl.placeholder = "พิมพ์รายรับและราคา...";
                    hintTextEl.innerText = "เว้นวรรคด้วยราคา เช่น รับเงินคืน 500";
                } else {
                    inputEl.placeholder = "พิมพ์รายจ่ายและราคา...";
                    hintTextEl.innerText = "เว้นวรรคด้วยราคา เช่น ค่าไฟ 1200";
                }
                
                // เรนเดอร์รายการใหม่ให้ตรงกับ Tab ปัจจุบัน
                renderTransactions();
                inputEl.focus();
            });
        });

        // จัดการ Tab สลับมุมมอง รายการ/สรุปรายวัน
        viewBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                viewBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                currentView = e.target.getAttribute('data-view');
                
                if(currentView === 'list') {
                    listEl.style.display = 'block';
                    dailySummaryContainer.style.display = 'none';
                } else {
                    listEl.style.display = 'none';
                    dailySummaryContainer.style.display = 'block';
                }
            });
        });

        const getExpensesCollection = () => {
            // โครงสร้าง Path แบบ Private ของผู้ใช้ (ปลอดภัยและเป็นไปตามกฎ)
            return collection(db, 'artifacts', appId, 'users', currentUser.uid, 'expenses');
        };

        const getExpenseDoc = (id) => {
            return doc(db, 'artifacts', appId, 'users', currentUser.uid, 'expenses', id);
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                loadingEl.innerText = 'ออฟไลน์';
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                const expensesCol = getExpensesCollection();
                
                unsubscribeSnapshot = onSnapshot(expensesCol, (snapshot) => {
                    transactions = [];
                    snapshot.forEach((doc) => {
                        transactions.push({ id: doc.id, ...doc.data() });
                    });
                    
                    transactions.sort((a, b) => {
                        const timeA = a.createdAt && a.createdAt.toDate ? a.createdAt.toDate().getTime() : Date.now();
                        const timeB = b.createdAt && b.createdAt.toDate ? b.createdAt.toDate().getTime() : Date.now();
                        return timeB - timeA;
                    });

                    renderTransactions();
                    
                    loadingEl.innerText = 'เชื่อมต่อแล้ว';
                    loadingEl.style.color = '#007AFF';

                    if (initialLoad) {
                        inputEl.focus();
                        initialLoad = false;
                    }

                }, (error) => {
                    console.error("Error fetching data:", error);
                    loadingEl.innerText = 'ออฟไลน์';
                    loadingEl.style.color = '#FF3B30';
                });
            } else {
                if (unsubscribeSnapshot) unsubscribeSnapshot();
            }
        });

        initAuth();

        function parseNormalInput(text) {
            text = text.trim();
            const regex = /^(.*?)\s*(\d+(?:\.\d+)?)\s*(?:บาท|b|baht|฿)?$/i;
            const match = text.match(regex);
            if (match) {
                let itemName = match[1].trim() || "ไม่ระบุรายการ";
                let itemPrice = parseFloat(match[2]);
                return { name: itemName, price: itemPrice, profit: 0 };
            }
            return null;
        }

        function parsePosInput(text) {
            const parts = text.trim().split(/\s+/);
            if (parts.length >= 2) {
                const sales = parseFloat(parts[0]);
                const profit = parseFloat(parts[1]);
                if (!isNaN(sales) && !isNaN(profit)) {
                    return { name: "ยอดขายประจำวัน", price: sales, profit: profit };
                }
            } else if (parts.length === 1) {
                const sales = parseFloat(parts[0]);
                if (!isNaN(sales)) {
                    return { name: "ยอดขายประจำวัน", price: sales, profit: 0 };
                }
            }
            return null;
        }

        async function addTransaction() {
            if (!currentUser) return;
            const rawText = inputEl.value;
            if (!rawText) return;

            let parsedData = null;
            if (currentType === 'pos1' || currentType === 'pos2') {
                parsedData = parsePosInput(rawText);
            } else {
                parsedData = parseNormalInput(rawText);
            }

            if (parsedData) {
                inputEl.value = '';

                try {
                    const expensesCol = getExpensesCollection();
                    await addDoc(expensesCol, {
                        name: parsedData.name,
                        price: parsedData.price,
                        profit: parsedData.profit || 0,
                        type: currentType,
                        createdAt: serverTimestamp()
                    });
                } catch (e) {
                    console.error("Error adding document: ", e);
                    console.warn("ไม่สามารถบันทึกข้อมูลได้");
                    if(inputEl.value === '') inputEl.value = rawText; 
                } finally {
                    inputEl.focus(); 
                }
            } else {
                const originalPlaceholder = inputEl.placeholder;
                inputEl.value = '';
                
                if (currentType === 'pos1' || currentType === 'pos2') {
                    inputEl.placeholder = "ผิดรูปแบบ! พิมพ์ยอดขายและกำไร (เช่น 1500 300)";
                } else {
                    inputEl.placeholder = "ผิดรูปแบบ! พิมพ์รายการและราคา (เช่น น้ำ 15)";
                }
                
                setTimeout(() => {
                    inputEl.placeholder = originalPlaceholder;
                    inputEl.value = rawText;
                }, 2000);
            }
        }

        listEl.addEventListener('click', async (e) => {
            const deleteBtn = e.target.closest('.delete-btn');
            const editBtn = e.target.closest('.edit-btn');
            
            if(deleteBtn && currentUser) {
                const id = deleteBtn.getAttribute('data-id');
                try {
                    await deleteDoc(getExpenseDoc(id));
                } catch (err) {
                    console.error("Error deleting document: ", err);
                }
            }

            if(editBtn && currentUser) {
                const id = editBtn.getAttribute('data-id');
                const exp = transactions.find(t => t.id === id);
                if (exp) {
                    editingId = id;
                    editName.value = exp.name;
                    editPrice.value = exp.price;
                    
                    if (exp.type === 'pos1' || exp.type === 'pos2') {
                        editProfitField.style.display = 'block';
                        editProfit.value = exp.profit || 0;
                    } else {
                        editProfitField.style.display = 'none';
                        editProfit.value = 0;
                    }

                    // แปลง Date จาก Firestore ให้อยู่ในรูปแบบ YYYY-MM-DDThh:mm เพื่อใส่ใน input type="datetime-local"
                    const expDate = exp.createdAt && exp.createdAt.toDate ? exp.createdAt.toDate() : new Date();
                    const pad = n => n < 10 ? '0'+n : n;
                    const yyyy = expDate.getFullYear();
                    const MM = pad(expDate.getMonth() + 1);
                    const dd = pad(expDate.getDate());
                    const hh = pad(expDate.getHours());
                    const mm = pad(expDate.getMinutes());
                    editDatetime.value = `${yyyy}-${MM}-${dd}T${hh}:${mm}`;

                    editModal.classList.add('show');
                }
            }
        });

        // ยกเลิกแก้ไข
        cancelEditBtn.addEventListener('click', () => {
            editModal.classList.remove('show');
            editingId = null;
        });

        // บันทึกแก้ไข
        saveEditBtn.addEventListener('click', async () => {
            if (!editingId || !currentUser) return;
            
            try {
                const exp = transactions.find(t => t.id === editingId);
                const newDate = new Date(editDatetime.value);
                
                const updateData = {
                    name: editName.value,
                    price: parseFloat(editPrice.value) || 0,
                    createdAt: Timestamp.fromDate(newDate)
                };
                
                if (exp.type === 'pos1' || exp.type === 'pos2') {
                    updateData.profit = parseFloat(editProfit.value) || 0;
                }

                await updateDoc(getExpenseDoc(editingId), updateData);
                
                editModal.classList.remove('show');
                editingId = null;
            } catch (err) {
                console.error("Error updating document: ", err);
            }
        });

        function isSameWeek(dateStr1, dateStr2) {
            const d1 = new Date(dateStr1);
            const d2 = new Date(dateStr2);
            d1.setHours(0,0,0,0);
            d2.setHours(0,0,0,0);
            
            const diff = d1.getDate() - d1.getDay(); 
            const startOfWeek1 = new Date(d1.setDate(diff));
            const diff2 = d2.getDate() - d2.getDay();
            const startOfWeek2 = new Date(d2.setDate(diff2));
            return startOfWeek1.getTime() === startOfWeek2.getTime();
        }

        function renderTransactions() {
            listEl.innerHTML = '';
            let totalOtherIncome = 0;
            let totalExpense = 0;
            let totalPos1Sales = 0, totalPos1Profit = 0;
            let totalPos2Sales = 0, totalPos2Profit = 0;
            
            const now = new Date();

            // 1. กรองข้อมูลตามช่วงเวลา
            const timeFilteredData = transactions.filter(exp => {
                const expDate = exp.createdAt && exp.createdAt.toDate ? exp.createdAt.toDate() : new Date();

                if (currentFilter === 'day') {
                    return expDate.toDateString() === now.toDateString();
                } else if (currentFilter === 'week') {
                    return isSameWeek(expDate, now);
                } else if (currentFilter === 'month') {
                    return expDate.getMonth() === now.getMonth() && expDate.getFullYear() === now.getFullYear();
                }
                return true; 
            });

            // 2. คำนวณยอดต่างๆ
            timeFilteredData.forEach(exp => {
                const type = exp.type || 'expense';
                const price = exp.price || 0;
                const profit = exp.profit || 0;
                
                if (type === 'income') {
                    totalOtherIncome += price;
                } else if (type === 'pos1') {
                    totalPos1Sales += price;
                    totalPos1Profit += profit;
                } else if (type === 'pos2') {
                    totalPos2Sales += price;
                    totalPos2Profit += profit;
                } else {
                    totalExpense += price;
                }
            });

            const totalAllIncome = totalOtherIncome + totalPos1Sales + totalPos2Sales;
            const netBalance = totalAllIncome - totalExpense;

            // 3. อัปเดตยอดคงเหลือ
            totalEl.innerText = netBalance.toLocaleString();

            // ---------------- สร้างตารางสรุปรายวัน (ฝั่งขวา) ----------------
            const dailyGroup = {};
            
            // จัดกลุ่มข้อมูลทั้งหมดตามวันที่ (ไม่สน currentType)
            timeFilteredData.forEach(exp => {
                const expDate = exp.createdAt && exp.createdAt.toDate ? exp.createdAt.toDate() : new Date();
                const dateKey = expDate.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }); 
                
                if (!dailyGroup[dateKey]) {
                    dailyGroup[dateKey] = { income: 0, expense: 0, profit: 0 };
                }
                
                const type = exp.type || 'expense';
                const price = exp.price || 0;
                const profit = exp.profit || 0;
                
                if (type === 'income' || type === 'pos1' || type === 'pos2') {
                    dailyGroup[dateKey].income += price;
                    if (type === 'pos1' || type === 'pos2') dailyGroup[dateKey].profit += profit;
                } else {
                    dailyGroup[dateKey].expense += price;
                }
            });

            if (Object.keys(dailyGroup).length === 0) {
                dailySummaryContainer.innerHTML = `<div class="empty-state">ไม่มีข้อมูลสรุปรายวันในช่วงเวลานี้</div>`;
            } else {
                let dailyHTML = `<div class="daily-table-wrapper"><table class="daily-table">
                    <thead><tr><th>วันที่</th><th>รับรวม</th><th>จ่าย</th><th>คงเหลือ</th></tr></thead><tbody>`;
                
                for (const [date, totals] of Object.entries(dailyGroup)) {
                    const net = totals.income - totals.expense;
                    const netClass = net >= 0 ? 'net-positive' : 'net-negative';
                    const prefix = net > 0 ? '+' : '';
                    
                    // แทรกยอดกำไรไว้ใต้รายรับหากมีกำไรจาก POS
                    const profitStr = totals.profit > 0 ? `<span class="profit-hint">(กำไร ${totals.profit.toLocaleString()})</span>` : '';
                    
                    dailyHTML += `<tr>
                        <td>${date}</td>
                        <td style="color:var(--ios-green);">${totals.income.toLocaleString()} ${profitStr}</td>
                        <td style="color:var(--ios-red);">${totals.expense.toLocaleString()}</td>
                        <td class="${netClass}">${prefix}${net.toLocaleString()}</td>
                    </tr>`;
                }
                dailyHTML += `</tbody></table></div>`;
                dailySummaryContainer.innerHTML = dailyHTML;
            }

            // ---------------- สร้างรายการ List (ฝั่งขวา) ----------------
            // 4. กรองข้อมูลที่จะแสดงใน List ตาม Tab
            const listData = timeFilteredData.filter(exp => {
                const type = exp.type || 'expense';
                return type === currentType;
            });

            if (listData.length === 0) {
                let emptyText = 'รายการ';
                if (currentType === 'income') emptyText = 'รายรับอื่นๆ';
                else if (currentType === 'expense') emptyText = 'รายจ่าย';
                else if (currentType === 'pos1') emptyText = 'ยอดขาย POS1';
                else if (currentType === 'pos2') emptyText = 'ยอดขาย POS2';
                
                listEl.innerHTML = `<div class="empty-state">ไม่มี${emptyText}ในช่วงเวลานี้</div>`;
                return;
            }

            // 5. จัดกลุ่มตามวันที่
            const groupedData = {};
            
            listData.forEach((exp) => {
                const expDate = exp.createdAt && exp.createdAt.toDate ? exp.createdAt.toDate() : new Date();
                const dateKey = expDate.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
                const timeStr = expDate.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

                if (!groupedData[dateKey]) {
                    groupedData[dateKey] = { items: [], totalDay: 0 };
                }
                
                groupedData[dateKey].items.push({...exp, timeStr});
                groupedData[dateKey].totalDay += exp.price;
            });

            // 6. สร้าง HTML
            for (const [date, data] of Object.entries(groupedData)) {
                const section = document.createElement('div');
                section.className = 'ios-section';

                const header = document.createElement('div');
                header.className = 'ios-section-header';
                header.innerHTML = `
                    <span>${date}</span>
                    <span>รวมยอด ${data.totalDay.toLocaleString()} ฿</span>
                `;
                section.appendChild(header);

                const ul = document.createElement('ul');
                ul.className = 'ios-list';

                data.items.forEach(exp => {
                    const li = document.createElement('li');
                    li.className = 'ios-list-item';
                    
                    const deleteSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                    const editSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
                    
                    let priceClass = 'item-price';
                    let prefix = '';
                    let subText = exp.timeStr || '...';
                    
                    if (exp.type === 'income') { priceClass += ' income'; prefix = '+'; }
                    else if (exp.type === 'pos1') { priceClass += ' pos1'; prefix = '+'; }
                    else if (exp.type === 'pos2') { priceClass += ' pos2'; prefix = '+'; }
                    else { priceClass += ' expense'; prefix = '-'; }

                    if ((exp.type === 'pos1' || exp.type === 'pos2') && exp.profit > 0) {
                        subText += ` <span class="item-profit">• กำไร ${exp.profit.toLocaleString()} ฿</span>`;
                    }

                    li.innerHTML = `
                        <div class="item-info">
                            <span class="item-name">${exp.name}</span>
                            <span class="item-time">${subText}</span>
                        </div>
                        <div class="item-right">
                            <span class="${priceClass}">${prefix}${exp.price.toLocaleString()} ฿</span>
                            <button class="edit-btn" data-id="${exp.id}">${editSvg}</button>
                            <button class="delete-btn" data-id="${exp.id}">${deleteSvg}</button>
                        </div>
                    `;
                    ul.appendChild(li);
                });

                section.appendChild(ul);
                listEl.appendChild(section);
            }
        }

        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTransaction();
            }
        });

    </script>
</body>
</html>
