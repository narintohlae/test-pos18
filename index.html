<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>โปรแกรมสรุปรายจ่าย</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-bg: #f4f5f9;
        }
        /* บังคับความสูง 100dvh (พอดีจอมือถือเป๊ะๆ) และห้ามเลื่อนลง */
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--app-bg); 
            -webkit-tap-highlight-color: transparent;
            height: 100dvh;
            overflow: hidden;
        }
        h1, h2, h3, .font-heading {
            font-family: 'Prompt', sans-serif;
        }
        
        .spinner { 
            border: 3px solid rgba(0,0,0,0.1); 
            border-left-color: currentColor; 
            border-radius: 50%; 
            width: 18px; 
            height: 18px; 
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite; 
            display: inline-block; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .toast-enter { animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideUp { 
            from { transform: translate(-50%, 100%); opacity: 0; } 
            to { transform: translate(-50%, 0); opacity: 1; } 
        }
        
        /* Modal Animation */
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        .modal-content-enter { animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="text-slate-800 flex justify-center selection:bg-blue-200">

    <!-- Main App Container (Full Height, Flex Column) -->
    <div class="w-full max-w-2xl h-full flex flex-col relative bg-[#f4f5f9] shadow-2xl">
        
        <!-- Header (Compact) -->
        <header class="flex-none pt-8 pb-3 px-6 flex justify-between items-center bg-[#f4f5f9] z-10">
            <div>
                <p class="text-xs font-medium text-slate-500 mb-0.5">ยินดีต้อนรับ 👋</p>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">ภาพรวมรายจ่าย</h1>
            </div>
            <div class="text-right">
                <span id="lastUpdated" class="block text-[10px] font-bold uppercase tracking-wider text-slate-500 bg-slate-200/60 px-3 py-1 rounded-full mb-1">รอการซิงค์</span>
                <button onclick="toggleModal('rawModal')" class="text-xs font-medium text-blue-600 hover:text-blue-700 flex items-center gap-1 justify-end w-full">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    ดูข้อมูลดิบ
                </button>
            </div>
        </header>

        <!-- Content Area (Takes remaining space) -->
        <main class="flex-1 min-h-0 flex flex-col px-5 pb-5 gap-4">
            
            <!-- Hero Card (Grand Total) -->
            <div class="flex-none bg-slate-900 rounded-[2rem] p-6 text-white shadow-xl relative overflow-hidden">
                <!-- Decorative Blur Orbs -->
                <div class="absolute top-0 right-0 w-48 h-48 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-40 translate-x-1/3 -translate-y-1/3"></div>
                <div class="absolute bottom-0 left-0 w-32 h-32 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-40 -translate-x-1/3 translate-y-1/3"></div>
                
                <div class="relative z-10">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/10">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <div class="bg-white/10 backdrop-blur-md px-3 py-1 rounded-full border border-white/5 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                            <span class="text-xs font-medium text-slate-200" id="totalItems">0 รายการ</span>
                        </div>
                    </div>
                    
                    <p class="text-slate-300 font-medium text-xs mb-1">ยอดรวมทั้งหมด</p>
                    <div class="flex items-baseline gap-2">
                        <span class="text-4xl sm:text-5xl font-heading font-extrabold tracking-tight" id="totalExpense">0</span>
                        <span class="text-lg font-medium text-slate-400">THB</span>
                    </div>
                </div>
            </div>

            <!-- Bento Box Actions (Compact) -->
            <div class="flex-none grid grid-cols-2 gap-3">
                <button onclick="fetchFromCloud()" id="btnSync" class="bg-blue-600 hover:bg-blue-700 active:scale-[0.97] transition-all duration-300 text-white py-4 px-3 rounded-2xl shadow-lg shadow-blue-500/25 flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    <span class="font-heading font-semibold text-sm">ดึงข้อมูล</span>
                </button>

                <div class="relative active:scale-[0.97] transition-all duration-300">
                    <input type="file" id="fileInput" accept=".txt" class="hidden" onchange="handleFileUpload(event)">
                    <label for="fileInput" class="bg-white hover:bg-slate-50 text-slate-800 py-4 px-3 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-center gap-3 cursor-pointer h-full">
                        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <span class="font-heading font-semibold text-sm">อัปโหลดไฟล์</span>
                    </label>
                </div>
            </div>

            <!-- Daily Summary (Horizontal Slider for single page feel) -->
            <section class="flex-1 flex flex-col min-h-0 mt-2">
                <div class="flex justify-between items-end mb-2 px-1">
                    <h2 class="text-base font-heading font-bold text-slate-900">สรุปรายวัน</h2>
                    <span class="text-[10px] text-slate-400">กดเพื่อดูรายละเอียด</span>
                </div>
                
                <!-- Horizontal Scroll Container -->
                <div id="dailySummaryContainer" class="flex-1 overflow-x-auto no-scrollbar flex gap-3 snap-x snap-mandatory items-stretch pb-2">
                    <!-- Cards will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modal: Daily Detail View -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden items-end sm:items-center justify-center p-0 sm:p-4 bg-slate-900/40 backdrop-blur-sm">
        <!-- ปรับให้มือถือเด้งจากด้านล่าง (Bottom Sheet) -->
        <div class="bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl w-full max-w-lg h-[80vh] sm:h-auto sm:max-h-[85vh] flex flex-col overflow-hidden modal-content-enter mt-auto sm:mt-0">
            <!-- Header -->
            <div class="flex justify-between items-center p-5 border-b border-slate-100 bg-white shrink-0 sticky top-0 z-10">
                <div>
                    <h3 id="detailModalTitle" class="font-heading font-bold text-slate-800 text-xl">บิลประจำวัน</h3>
                    <p id="detailModalCount" class="text-xs text-slate-500 font-medium mt-0.5">0 รายการ</p>
                </div>
                <button onclick="toggleModal('detailModal')" class="bg-slate-100 hover:bg-slate-200 text-slate-500 p-2.5 rounded-full transition-colors active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- List Items -->
            <div class="p-5 overflow-y-auto bg-slate-50 flex-1 no-scrollbar">
                <ul id="detailModalList" class="space-y-2">
                    <!-- รายการจะมาโชว์ตรงนี้ -->
                </ul>
            </div>

            <!-- Footer (Total for the day) -->
            <div class="p-5 border-t border-slate-100 bg-white shrink-0">
                <div class="flex justify-between items-center bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                    <span class="font-heading font-semibold text-blue-800">ยอดรวมวันนี้</span>
                    <div class="flex items-baseline gap-1.5">
                        <span id="detailModalTotal" class="text-2xl font-heading font-bold text-blue-700">0</span>
                        <span class="text-xs font-bold text-blue-400">THB</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Raw Data View -->
    <div id="rawModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col overflow-hidden modal-content-enter">
            <div class="flex justify-between items-center p-5 border-b border-slate-100 bg-white shrink-0">
                <h3 class="font-heading font-bold text-slate-800 text-lg flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    ข้อมูลดิบในไฟล์
                </h3>
                <button onclick="toggleModal('rawModal')" class="bg-slate-100 hover:bg-slate-200 text-slate-500 p-2.5 rounded-full transition-colors active:scale-95">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-5 overflow-y-auto bg-slate-50 flex-1">
                <div id="textContent" class="font-mono text-sm text-slate-600 whitespace-pre-wrap">รอการดึงข้อมูล...</div>
            </div>
        </div>
    </div>

    <!-- Floating Toast Notification -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-[60] hidden">
        <div id="toastContent" class="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-medium text-sm flex items-center gap-3 border border-slate-700/50 backdrop-blur-md">
            <span id="toastIcon"></span>
            <span id="toastMessage">แจ้งเตือน</span>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby5wog2rJaNIqPplRKoIzvm-EWolvtSGkEZ8Owrav1sxlkqKdshENQUdPLoSGoH9M_Y/exec";

        // ตัวแปรเก็บข้อมูลรายวันเพื่อใช้ตอนกดเปิด Modal
        let globalDailyData = {};

        // Modal Logic
        function toggleModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex', 'modal-enter');
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex', 'modal-enter');
            }
        }

        async function fetchFromCloud() {
            const btn = document.getElementById('btnSync');
            const originalHTML = btn.innerHTML;
            
            try {
                btn.innerHTML = `
                    <div class="spinner text-white"></div>
                    <span class="font-heading font-semibold text-sm">กำลังดึง...</span>
                `;
                btn.style.pointerEvents = 'none';

                const response = await fetch(SCRIPT_URL, { redirect: 'follow' });
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                processTextAndCalculate(data.content, data.updateTime);
                showToast('อัปเดตข้อมูลล่าสุดแล้ว', 'success');

            } catch (error) {
                console.error('Error fetching data:', error);
                showToast('ไม่สามารถดึงข้อมูลได้', 'error');
            } finally {
                btn.innerHTML = originalHTML;
                btn.style.pointerEvents = 'auto';
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const now = new Date().toLocaleTimeString("th-TH", { hour: '2-digit', minute: '2-digit' });
                processTextAndCalculate(text, `วันนี้ ${now}`);
                showToast('อ่านไฟล์สำเร็จ', 'success');
            };
            reader.readAsText(file, 'UTF-8');
            event.target.value = '';
        }

        function processTextAndCalculate(text, updateTime) {
            document.getElementById('textContent').textContent = text;
            document.getElementById('lastUpdated').textContent = updateTime;

            const lines = text.split(/\r\n|\n|\r/);
            let totalExpense = 0;
            let totalItems = 0;
            globalDailyData = {}; // รีเซ็ตข้อมูลใหม่
            let currentDate = "รายการทั่วไป";

            const dateRegex = /^\d{1,2}[-\/]\d{1,2}[-\/]\d{2,4}$/;

            lines.forEach(line => {
                const trimmedLine = line.trim();
                if (trimmedLine === "") return;

                if (dateRegex.test(trimmedLine)) {
                    currentDate = trimmedLine;
                    if (!globalDailyData[currentDate]) globalDailyData[currentDate] = { total: 0, items: [] };
                    return;
                }

                // พยายามแยก "ชื่อรายการ" และ "ราคา" ออกจากกัน
                // ค้นหาตัวเลขที่อยู่ท้ายสุดของบรรทัด
                const match = trimmedLine.match(/(.*?)(\d+(?:\.\d+)?)$/);
                if (match) {
                    const itemName = match[1].trim() || 'ไม่ระบุชื่อรายการ';
                    const amount = parseFloat(match[2]);
                    
                    totalExpense += amount;
                    totalItems++;

                    if (!globalDailyData[currentDate]) globalDailyData[currentDate] = { total: 0, items: [] };
                    
                    // บันทึกยอดรวมของวัน
                    globalDailyData[currentDate].total += amount;
                    // บันทึกรายการย่อย
                    globalDailyData[currentDate].items.push({ name: itemName, amount: amount });
                }
            });

            document.getElementById('totalExpense').textContent = totalExpense.toLocaleString('th-TH');
            document.getElementById('totalItems').textContent = totalItems.toLocaleString('th-TH') + ' รายการ';

            renderDailySummary();
        }

        function renderDailySummary() {
            const container = document.getElementById('dailySummaryContainer');
            container.innerHTML = ''; 
            
            let hasData = false;
            
            for (const [date, data] of Object.entries(globalDailyData)) {
                if (data.total > 0) {
                    hasData = true;
                    const isGeneral = date === "รายการทั่วไป";
                    
                    // เพิ่ม cursor-pointer, hover, และ onclick ให้คลิกได้
                    const html = `
                        <div onclick="openDailyDetails('${date}')" class="cursor-pointer hover:bg-slate-50 active:scale-[0.98] transition-all duration-200 min-w-[200px] sm:min-w-[240px] bg-white p-5 rounded-[1.5rem] border border-slate-100 shadow-[0_2px_10px_rgb(0,0,0,0.03)] flex flex-col justify-between snap-center shrink-0 h-full relative group">
                            <div class="absolute top-4 right-4 text-slate-300 group-hover:text-blue-500 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                            <div class="flex items-center gap-3 mb-4 pr-6">
                                <div class="w-10 h-10 rounded-xl flex items-center justify-center ${isGeneral ? 'bg-slate-100 text-slate-500' : 'bg-blue-50 text-blue-600'}">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        ${isGeneral 
                                            ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>'
                                            : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>'
                                        }
                                    </svg>
                                </div>
                                <h3 class="font-heading font-semibold text-slate-800 text-base truncate">${date}</h3>
                            </div>
                            <div>
                                <p class="text-[11px] text-slate-400 font-medium mb-1">${data.items.length} รายการ</p>
                                <div class="flex items-baseline gap-1">
                                    <span class="text-2xl font-heading font-bold text-slate-900">${data.total.toLocaleString('th-TH')}</span>
                                    <span class="text-xs font-bold text-slate-400">THB</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                }
            }

            if (!hasData) {
                container.innerHTML = `
                    <div class="min-w-full sm:min-w-[280px] bg-white rounded-3xl border border-dashed border-slate-200 flex flex-col items-center justify-center p-6 text-slate-400 snap-center shrink-0 h-full">
                        <svg class="w-8 h-8 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <p class="text-sm font-medium">ไม่พบรายการค่าใช้จ่าย</p>
                    </div>
                `;
            }
        }

        // ฟังก์ชันเปิด Modal และวาดรายการของวันนั้นๆ
        function openDailyDetails(date) {
            const data = globalDailyData[date];
            if (!data) return;

            document.getElementById('detailModalTitle').textContent = date;
            document.getElementById('detailModalCount').textContent = `${data.items.length} รายการ`;
            document.getElementById('detailModalTotal').textContent = data.total.toLocaleString('th-TH');

            const listContainer = document.getElementById('detailModalList');
            listContainer.innerHTML = '';

            data.items.forEach(item => {
                const li = document.createElement('li');
                li.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center";
                li.innerHTML = `
                    <span class="text-slate-700 font-medium text-sm flex-1 pr-4">${item.name}</span>
                    <span class="font-heading font-bold text-slate-900">${item.amount.toLocaleString('th-TH')}</span>
                `;
                listContainer.appendChild(li);
            });

            toggleModal('detailModal');
        }

        let toastTimeout;
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            const iconEl = document.getElementById('toastIcon');

            msgEl.textContent = message;
            
            if (type === 'success') {
                iconEl.innerHTML = '<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
            } else {
                iconEl.innerHTML = '<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            }

            toast.classList.remove('hidden');
            toast.classList.add('toast-enter');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast-enter');
            }, 3000);
        }

        window.onload = fetchFromCloud;
    </script>
</body>
</html>
