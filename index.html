<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wallet 2026</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Google Fonts (Prompt for Thai support) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Prompt', sans-serif; }
    /* Hide scrollbar for clean UI */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-0 sm:p-4 text-gray-800">

  <!-- Mobile Container -->
  <div class="w-full max-w-md bg-gray-50 h-[100dvh] sm:h-[850px] relative overflow-hidden flex flex-col shadow-2xl sm:rounded-[40px] sm:border-[8px] border-gray-800">
    
    <!-- ================= VIEW: HOME ================= -->
    <div id="view-home" class="flex-1 flex flex-col overflow-y-auto pb-24">
      <!-- Header / Summary Card -->
      <div class="bg-emerald-600 text-white p-6 pb-8 rounded-b-[32px] shadow-md">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-xl font-bold tracking-wide">Wallet 2026</h1>
          <div class="flex gap-2">
            <button onclick="app.switchView('settings')" class="bg-emerald-500/50 p-2 rounded-full hover:bg-emerald-400 transition">
              <i data-lucide="settings" class="w-6 h-6"></i>
            </button>
            <div class="bg-emerald-500/50 p-2 rounded-full">
              <i data-lucide="wallet" class="w-6 h-6"></i>
            </div>
          </div>
        </div>

        <!-- Profile Switcher -->
        <div class="flex bg-emerald-700/50 rounded-xl p-1 mb-6" id="home-profile-switcher">
          <!-- Rendered via JS -->
        </div>
        
        <div class="mb-2 text-emerald-100 text-sm" id="home-balance-label">ยอดคงเหลือรวม</div>
        <div class="text-4xl font-bold mb-6 tracking-tight" id="home-total-balance">฿0.00</div>
        
        <div class="flex bg-emerald-700/50 rounded-2xl p-4 gap-4">
          <div class="flex-1">
            <div class="flex items-center gap-1 text-emerald-200 text-xs mb-1">
              <i data-lucide="arrow-down-circle" class="w-3.5 h-3.5"></i> รายรับ
            </div>
            <div class="font-semibold text-lg" id="home-total-income">฿0.00</div>
          </div>
          <div class="w-px bg-emerald-500/50"></div>
          <div class="flex-1">
            <div class="flex items-center gap-1 text-red-200 text-xs mb-1">
              <i data-lucide="arrow-up-circle" class="w-3.5 h-3.5"></i> รายจ่าย
            </div>
            <div class="font-semibold text-lg" id="home-total-expense">฿0.00</div>
          </div>
        </div>
      </div>

      <!-- Recent Transactions -->
      <div class="p-6">
        <div class="flex justify-between items-end mb-4">
          <h2 class="text-lg font-bold text-gray-800">รายการล่าสุด</h2>
          <button onclick="app.switchView('history')" class="text-sm text-emerald-600 font-medium hover:underline">ดูทั้งหมด</button>
        </div>
        <div id="home-transactions-list" class="space-y-3">
          <!-- Rendered via JS -->
        </div>
      </div>
    </div>

    <!-- ================= VIEW: ADD TRANSACTION ================= -->
    <div id="view-add" class="hidden flex-1 flex flex-col bg-white h-full relative z-10">
      <div class="flex items-center justify-between p-4 border-b border-gray-100">
        <button onclick="app.switchView('home')" class="p-2 hover:bg-gray-100 rounded-full transition">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-lg font-bold">เพิ่มรายการใหม่</h1>
        <div class="w-10"></div>
      </div>

      <div class="flex-1 overflow-y-auto p-6 pb-24">
        <!-- User Switcher for New Transaction -->
        <div class="flex gap-2 mb-4" id="add-user-switcher">
          <!-- Rendered via JS -->
        </div>

        <!-- Type Switcher -->
        <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
          <button id="btn-type-expense" onclick="app.setFormType('expense')" class="flex-1 py-2 rounded-lg font-medium transition-all bg-white shadow-sm text-rose-600">รายจ่าย</button>
          <button id="btn-type-income" onclick="app.setFormType('income')" class="flex-1 py-2 rounded-lg font-medium transition-all text-gray-500 hover:text-gray-700">รายรับ</button>
        </div>

        <form onsubmit="app.saveTransaction(event)" class="space-y-6">
          <!-- Amount Input -->
          <div class="text-center">
            <label class="block text-sm font-medium text-gray-500 mb-2">จำนวนเงิน (บาท)</label>
            <input type="number" id="form-amount" inputmode="decimal" placeholder="0.00" step="0.01" required
              class="text-5xl font-bold text-center w-full bg-transparent border-b-2 focus:outline-none focus:border-gray-800 pb-2 transition-colors text-rose-600" />
          </div>

          <!-- Category Selection -->
          <div>
            <label class="block text-sm font-medium text-gray-500 mb-3">หมวดหมู่</label>
            <div id="add-category-grid" class="grid grid-cols-4 gap-4">
              <!-- Rendered via JS -->
            </div>
          </div>

          <!-- Date Selection -->
          <div>
            <label class="block text-sm font-medium text-gray-500 mb-2">วันที่</label>
            <input type="date" id="form-date" required
              class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-gray-800 focus:outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>

          <!-- Note -->
          <div>
            <label class="block text-sm font-medium text-gray-500 mb-2">โน้ตเพิ่มเติม (ถ้ามี)</label>
            <input type="text" id="form-note" placeholder="ระบุรายละเอียด..."
              class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-gray-800 focus:outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>

          <button type="submit" id="btn-submit-tx"
            class="w-full py-4 rounded-2xl font-bold text-white text-lg shadow-lg hover:opacity-90 transition-opacity bg-rose-600 shadow-rose-600/30">
            บันทึกรายการ
          </button>
        </form>
      </div>
    </div>

    <!-- ================= VIEW: HISTORY ================= -->
    <div id="view-history" class="hidden flex-1 flex flex-col bg-gray-50 h-full relative z-10">
      <div class="bg-white px-4 py-4 flex items-center justify-between border-b border-gray-100 shadow-sm z-10 relative">
        <h1 class="text-xl font-bold text-gray-800">ประวัติการเงิน</h1>
        <div class="text-sm font-medium text-gray-500" id="history-total-count">ทั้งหมด 0 รายการ</div>
      </div>

      <!-- Profile Filter in History -->
      <div class="bg-white px-4 py-3 border-b border-gray-100 flex gap-2 overflow-x-auto hide-scrollbar z-0" id="history-profile-switcher">
        <!-- Rendered via JS -->
      </div>

      <div class="flex-1 overflow-y-auto p-4 pb-24" id="history-transactions-list">
        <!-- Rendered via JS -->
      </div>
    </div>

    <!-- ================= VIEW: SETTINGS ================= -->
    <div id="view-settings" class="hidden flex-1 flex flex-col bg-gray-50 h-full relative z-20">
      <div class="flex items-center justify-between p-4 border-b border-gray-100 bg-white shadow-sm z-20">
        <button onclick="app.switchView('home')" class="p-2 hover:bg-gray-100 rounded-full transition">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-lg font-bold">ตั้งค่าผู้ใช้งาน</h1>
        <div class="w-10"></div>
      </div>
      
      <div class="flex-1 p-6 overflow-y-auto">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">ชื่อผู้ใช้ที่ 1 (สีฟ้า)</label>
            <input type="text" id="setting-user1-name" oninput="app.updateUserName('user1', this.value)"
              class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none text-gray-800" placeholder="เช่น พ่อ, สามี, John">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">ชื่อผู้ใช้ที่ 2 (สีชมพู)</label>
            <input type="text" id="setting-user2-name" oninput="app.updateUserName('user2', this.value)"
              class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-pink-500 outline-none text-gray-800" placeholder="เช่น แม่, ภรรยา, Jane">
          </div>
          <div class="text-xs text-emerald-600 font-medium text-center mt-4" id="settings-status">
            ข้อมูลจะถูกบันทึกอัตโนมัติลงในระบบคลาวด์ (Firebase)
          </div>
        </div>
      </div>
    </div>

    <!-- ================= BOTTOM NAVIGATION ================= -->
    <div id="bottom-nav" class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] px-6 py-4 flex justify-between items-center z-20 pb-safe">
      <button onclick="app.switchView('home')" id="nav-home" class="flex flex-col items-center gap-1 transition-colors text-emerald-600">
        <i data-lucide="home" class="w-6 h-6 fill-current opacity-20" id="nav-icon-home"></i>
        <span class="text-[10px] font-medium">ภาพรวม</span>
      </button>

      <!-- FAB -->
      <button onclick="app.switchView('add')" class="absolute left-1/2 -top-6 -translate-x-1/2 bg-emerald-600 hover:bg-emerald-700 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-[0_8px_20px_-6px_rgba(5,150,105,0.6)] border-4 border-gray-50 transition-transform hover:scale-105">
        <i data-lucide="plus" class="w-8 h-8"></i>
      </button>

      <button onclick="app.switchView('history')" id="nav-history" class="flex flex-col items-center gap-1 transition-colors text-gray-400 hover:text-gray-600">
        <i data-lucide="list" class="w-6 h-6" id="nav-icon-history"></i>
        <span class="text-[10px] font-medium">ประวัติ</span>
      </button>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="global-loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center transition-opacity">
    <div class="w-12 h-12 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin mb-4"></div>
    <div class="text-emerald-700 font-medium">กำลังเชื่อมต่อฐานข้อมูล...</div>
  </div>

  <!-- ================= FIREBASE & APP LOGIC ================= -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- Configuration & Constants ---
    const EXPENSE_CATEGORIES = [
      { id: 'food', name: 'อาหาร', icon: 'coffee', color: 'bg-orange-100 text-orange-600' },
      { id: 'transport', name: 'เดินทาง', icon: 'bus', color: 'bg-blue-100 text-blue-600' },
      { id: 'shopping', name: 'ช้อปปิ้ง', icon: 'shopping-bag', color: 'bg-pink-100 text-pink-600' },
      { id: 'bills', name: 'บิลต่างๆ', icon: 'file-text', color: 'bg-purple-100 text-purple-600' },
      { id: 'entertainment', name: 'บันเทิง', icon: 'film', color: 'bg-yellow-100 text-yellow-600' },
      { id: 'other_exp', name: 'อื่นๆ', icon: 'more-horizontal', color: 'bg-gray-200 text-gray-600' },
    ];

    const INCOME_CATEGORIES = [
      { id: 'salary', name: 'เงินเดือน', icon: 'briefcase', color: 'bg-emerald-100 text-emerald-600' },
      { id: 'business', name: 'ธุรกิจ', icon: 'dollar-sign', color: 'bg-teal-100 text-teal-600' },
      { id: 'gift', name: 'โบนัส/ของขวัญ', icon: 'gift', color: 'bg-indigo-100 text-indigo-600' },
      { id: 'other_inc', name: 'อื่นๆ', icon: 'more-horizontal', color: 'bg-gray-200 text-gray-600' },
    ];

    const CATEGORY_MAP = [...EXPENSE_CATEGORIES, ...INCOME_CATEGORIES].reduce((acc, cat) => {
      acc[cat.id] = cat; return acc;
    }, {});

    const INITIAL_USERS = {
      'user1': { id: 'user1', name: 'ผู้ใช้ 1', color: 'bg-blue-500', bg: 'bg-blue-100', text: 'text-blue-700' },
      'user2': { id: 'user2', name: 'ผู้ใช้ 2', color: 'bg-pink-500', bg: 'bg-pink-100', text: 'text-pink-700' }
    };

    // Firebase Setup
    let firebaseConfig = {
      apiKey: "AIzaSyAgTWrI1G1t3GYVz4-SPM7btrsixSe0el8",
      authDomain: "time-tracker-46283.firebaseapp.com",
      projectId: "time-tracker-46283",
      storageBucket: "time-tracker-46283.firebasestorage.app",
      messagingSenderId: "882533547295",
      appId: "1:882533547295:web:4b78bfc84322c58a50042a",
      measurementId: "G-5DPBNCSWFW"
    };

    // Use environment config if provided in the canvas
    if (typeof __firebase_config !== 'undefined') {
      try { firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}
    }

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'finance-app-2026';

    // --- State Management ---
    window.state = {
      user: null,
      transactions: [],
      users: INITIAL_USERS,
      currentView: 'home',
      activeProfile: 'all',
      formType: 'expense',
      formUser: 'user1',
      formCategory: 'food'
    };

    // Initialize Dates
    document.getElementById('form-date').value = new Date().toISOString().split('T')[0];

    // --- Core Logic Object (Exposed to window for HTML event listeners) ---
    window.app = {
      
      // Initialize Application
      init: async () => {
        lucide.createIcons();
        
        // Auth First Rule
        try {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        } catch (error) {
          console.error("Auth Error:", error);
          document.getElementById('global-loader').innerHTML = "<div class='text-red-500'>เกิดข้อผิดพลาดในการเชื่อมต่อ</div>";
        }

        onAuthStateChanged(auth, (user) => {
          if (user) {
            state.user = user;
            app.setupListeners();
            document.getElementById('global-loader').style.display = 'none';
          }
        });
      },

      setupListeners: () => {
        if (!state.user) return;
        const uid = state.user.uid;

        // Transactions Listener
        const txPath = collection(db, 'artifacts', appId, 'users', uid, 'transactions');
        onSnapshot(txPath, (snapshot) => {
          const txs = [];
          snapshot.forEach((doc) => txs.push(doc.data()));
          txs.sort((a, b) => b.timestamp - a.timestamp); // Sort newest first in memory
          state.transactions = txs;
          app.render();
        }, (err) => console.error(err));

        // Users Settings Listener
        const settingsPath = doc(db, 'artifacts', appId, 'users', uid, 'settings', 'userProfiles');
        onSnapshot(settingsPath, (docSnap) => {
          if (docSnap.exists()) {
            state.users = docSnap.data();
            document.getElementById('setting-user1-name').value = state.users.user1.name;
            document.getElementById('setting-user2-name').value = state.users.user2.name;
            app.render();
          }
        }, (err) => console.error(err));
      },

      switchView: (view) => {
        state.currentView = view;
        ['home', 'add', 'history', 'settings'].forEach(v => {
          const el = document.getElementById(`view-${v}`);
          if (el) el.classList.toggle('hidden', v !== view);
        });

        // Toggle Bottom Nav visibility
        const bottomNav = document.getElementById('bottom-nav');
        if (view === 'add' || view === 'settings') {
          bottomNav.classList.add('hidden');
        } else {
          bottomNav.classList.remove('hidden');
          
          // Update Nav Active State
          const isHome = view === 'home';
          document.getElementById('nav-home').className = `flex flex-col items-center gap-1 transition-colors ${isHome ? 'text-emerald-600' : 'text-gray-400 hover:text-gray-600'}`;
          document.getElementById('nav-icon-home').className = `w-6 h-6 ${isHome ? 'fill-current opacity-20' : ''}`;
          
          document.getElementById('nav-history').className = `flex flex-col items-center gap-1 transition-colors ${!isHome ? 'text-emerald-600' : 'text-gray-400 hover:text-gray-600'}`;
          document.getElementById('nav-icon-history').className = `w-6 h-6 ${!isHome ? 'fill-current opacity-20' : ''}`;
        }
        
        if (view === 'add') app.renderAddForm();
        app.render();
      },

      setActiveProfile: (profile) => {
        state.activeProfile = profile;
        app.render();
      },

      setFormType: (type) => {
        state.formType = type;
        if (type === 'expense' && !EXPENSE_CATEGORIES.find(c => c.id === state.formCategory)) state.formCategory = 'food';
        if (type === 'income' && !INCOME_CATEGORIES.find(c => c.id === state.formCategory)) state.formCategory = 'salary';
        app.renderAddForm();
      },

      setFormUser: (userId) => {
        state.formUser = userId;
        app.renderAddForm();
      },

      setFormCategory: (catId) => {
        state.formCategory = catId;
        app.renderAddForm();
      },

      updateUserName: async (userId, newName) => {
        if (!state.user) return;
        state.users[userId].name = newName;
        app.render(); // update UI instantly
        
        // Debounce update to Firestore (simplistic)
        clearTimeout(window.updateTimer);
        const statusEl = document.getElementById('settings-status');
        statusEl.innerText = "กำลังบันทึก...";
        
        window.updateTimer = setTimeout(async () => {
          try {
            await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'settings', 'userProfiles'), state.users);
            statusEl.innerText = "บันทึกเรียบร้อย";
            setTimeout(() => statusEl.innerText = "ข้อมูลจะถูกบันทึกอัตโนมัติลงในระบบคลาวด์ (Firebase)", 2000);
          } catch (error) {
            console.error(error);
            statusEl.innerText = "เกิดข้อผิดพลาดในการบันทึก";
          }
        }, 800);
      },

      saveTransaction: async (e) => {
        e.preventDefault();
        if (!state.user) return alert('รอการเชื่อมต่อฐานข้อมูล');
        
        const amountEl = document.getElementById('form-amount');
        const amount = Number(amountEl.value);
        if (!amount || isNaN(amount) || amount <= 0) return alert('กรุณากรอกจำนวนเงินให้ถูกต้อง');

        const txId = Date.now().toString();
        const newTx = {
          id: txId,
          userId: state.formUser,
          type: state.formType,
          amount: amount,
          category: state.formCategory,
          note: document.getElementById('form-note').value,
          date: document.getElementById('form-date').value,
          timestamp: Date.now()
        };

        const btn = document.getElementById('btn-submit-tx');
        btn.disabled = true;
        btn.innerHTML = '<i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto"></i>';
        lucide.createIcons();

        try {
          await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'transactions', txId), newTx);
          
          // Reset form
          amountEl.value = '';
          document.getElementById('form-note').value = '';
          app.switchView('home');
        } catch (error) {
          console.error(error);
          alert('ไม่สามารถบันทึกข้อมูลได้');
        } finally {
          btn.disabled = false;
          btn.innerText = 'บันทึกรายการ';
        }
      },

      deleteTransaction: async (id) => {
        if (!state.user) return;
        
        // Use custom modal instead of alert/confirm in real apps, but for simplicity here we simulate it via UI
        const isConfirmed = confirm('คุณต้องการลบรายการนี้ใช่หรือไม่?');
        if (isConfirmed) {
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'transactions', id));
          } catch (error) {
            console.error(error);
          }
        }
      },

      // --- Rendering Helpers ---

      getFilteredTransactions: () => {
        if (state.activeProfile === 'all') return state.transactions;
        return state.transactions.filter(t => t.userId === state.activeProfile || !t.userId);
      },

      formatCurrency: (amount) => {
        return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(amount);
      },

      formatDate: (dateString) => {
        const date = new Date(dateString);
        return new Intl.DateTimeFormat('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }).format(date);
      },

      // Main Render loop
      render: () => {
        const filteredTxs = app.getFilteredTransactions();
        const totals = filteredTxs.reduce((acc, curr) => {
          if (curr.type === 'income') acc.income += curr.amount;
          if (curr.type === 'expense') acc.expense += curr.amount;
          acc.balance = acc.income - acc.expense;
          return acc;
        }, { income: 0, expense: 0, balance: 0 });

        // Update Profiles Switcher HTML (used in both Home and History)
        const profileSwitcherHtml = `
          <button onclick="app.setActiveProfile('all')" class="flex-1 py-1.5 text-sm rounded-lg font-medium transition-all ${state.activeProfile === 'all' ? 'bg-white text-emerald-700 shadow-sm' : 'text-emerald-100 hover:text-white'}">
            <div class="flex items-center justify-center gap-1"><i data-lucide="users" class="w-4 h-4"></i> รวม</div>
          </button>
          <button onclick="app.setActiveProfile('user1')" class="flex-1 py-1.5 text-sm rounded-lg font-medium transition-all ${state.activeProfile === 'user1' ? 'bg-white text-emerald-700 shadow-sm' : 'text-emerald-100 hover:text-white'}">
            <div class="flex items-center justify-center gap-1"><i data-lucide="user" class="w-4 h-4"></i> ${state.users['user1'].name}</div>
          </button>
          <button onclick="app.setActiveProfile('user2')" class="flex-1 py-1.5 text-sm rounded-lg font-medium transition-all ${state.activeProfile === 'user2' ? 'bg-white text-emerald-700 shadow-sm' : 'text-emerald-100 hover:text-white'}">
            <div class="flex items-center justify-center gap-1"><i data-lucide="user" class="w-4 h-4"></i> ${state.users['user2'].name}</div>
          </button>
        `;

        // Update Home View
        document.getElementById('home-profile-switcher').innerHTML = profileSwitcherHtml;
        document.getElementById('home-balance-label').innerText = `ยอดคงเหลือ${state.activeProfile !== 'all' ? ` (${state.users[state.activeProfile].name})` : 'รวม'}`;
        document.getElementById('home-total-balance').innerText = app.formatCurrency(totals.balance);
        document.getElementById('home-total-income').innerText = app.formatCurrency(totals.income);
        document.getElementById('home-total-expense').innerText = app.formatCurrency(totals.expense);

        // Update Home Transactions List
        const homeListEl = document.getElementById('home-transactions-list');
        if (filteredTxs.length === 0) {
          homeListEl.innerHTML = `
            <div class="text-center py-10 bg-white rounded-2xl border border-gray-100 shadow-sm">
              <div class="bg-gray-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                <i data-lucide="wallet" class="w-6 h-6 text-gray-400"></i>
              </div>
              <p class="text-gray-500 font-medium">ยังไม่มีรายการ</p>
              <p class="text-gray-400 text-sm mt-1">กดปุ่ม + ด้านล่างเพื่อเพิ่มรายการ</p>
            </div>
          `;
        } else {
          homeListEl.innerHTML = filteredTxs.slice(0, 5).map(tx => {
            const cat = CATEGORY_MAP[tx.category] || CATEGORY_MAP['other_exp'];
            const userRec = state.users[tx.userId || 'user1'];
            const isInc = tx.type === 'income';
            return `
              <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 relative overflow-hidden">
                <div class="absolute left-0 top-0 bottom-0 w-1 ${userRec.color}"></div>
                <div class="w-12 h-12 rounded-full flex items-center justify-center ${cat.color} ml-1 shrink-0">
                  <i data-lucide="${cat.icon}" class="w-6 h-6"></i>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <h3 class="font-semibold text-gray-800 truncate">${cat.name}</h3>
                    ${state.activeProfile === 'all' ? `<span class="text-[10px] px-2 py-0.5 rounded-full shrink-0 ${userRec.bg} ${userRec.text}">${userRec.name}</span>` : ''}
                  </div>
                  <div class="text-xs text-gray-500 flex gap-2">
                    <span class="shrink-0">${app.formatDate(tx.date)}</span>
                    ${tx.note ? `<span class="truncate block">- ${tx.note}</span>` : ''}
                  </div>
                </div>
                <div class="font-bold shrink-0 ${isInc ? 'text-emerald-600' : 'text-rose-600'}">
                  ${isInc ? '+' : '-'}${app.formatCurrency(tx.amount)}
                </div>
              </div>
            `;
          }).join('');
        }

        // Update History View
        document.getElementById('history-total-count').innerText = `ทั้งหมด ${filteredTxs.length} รายการ`;
        document.getElementById('history-profile-switcher').innerHTML = `
          <button onclick="app.setActiveProfile('all')" class="whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-all ${state.activeProfile === 'all' ? 'bg-gray-800 text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">รวมทั้งหมด</button>
          <button onclick="app.setActiveProfile('user1')" class="whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-all ${state.activeProfile === 'user1' ? 'bg-blue-500 text-white shadow-sm' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}">${state.users['user1'].name}</button>
          <button onclick="app.setActiveProfile('user2')" class="whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-all ${state.activeProfile === 'user2' ? 'bg-pink-500 text-white shadow-sm' : 'bg-pink-50 text-pink-600 hover:bg-pink-100'}">${state.users['user2'].name}</button>
        `;

        const historyListEl = document.getElementById('history-transactions-list');
        if (filteredTxs.length === 0) {
          historyListEl.innerHTML = '<div class="text-center py-10"><p class="text-gray-500">ไม่มีประวัติรายการ</p></div>';
        } else {
          // Group by Date
          const grouped = filteredTxs.reduce((acc, tx) => {
            if (!acc[tx.date]) acc[tx.date] = [];
            acc[tx.date].push(tx);
            return acc;
          }, {});

          const sortedDates = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));
          
          historyListEl.innerHTML = sortedDates.map(date => `
            <div class="mb-6">
              <h3 class="text-sm font-bold text-gray-500 mb-3 px-2">${app.formatDate(date)}</h3>
              <div class="bg-white rounded-2xl shadow-sm border border-gray-100 divide-y divide-gray-50 overflow-hidden">
                ${grouped[date].map(tx => {
                  const cat = CATEGORY_MAP[tx.category] || CATEGORY_MAP['other_exp'];
                  const userRec = state.users[tx.userId || 'user1'];
                  const isInc = tx.type === 'income';
                  return `
                    <div class="p-4 flex items-center gap-4 relative">
                      <div class="absolute left-0 top-0 bottom-0 w-1 ${userRec.color}"></div>
                      <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 ${cat.color} ml-1">
                        <i data-lucide="${cat.icon}" class="w-5 h-5"></i>
                      </div>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                          <h4 class="font-medium text-gray-900 truncate">${cat.name}</h4>
                          ${state.activeProfile === 'all' ? `<span class="flex-shrink-0 text-[10px] px-1.5 py-0.5 rounded text-white ${userRec.color}">${userRec.name}</span>` : ''}
                        </div>
                        ${tx.note ? `<p class="text-xs text-gray-500 truncate">${tx.note}</p>` : ''}
                      </div>
                      <div class="text-right">
                        <div class="font-semibold ${isInc ? 'text-emerald-600' : 'text-rose-600'}">
                          ${isInc ? '+' : '-'}${app.formatCurrency(tx.amount)}
                        </div>
                      </div>
                      <button onclick="app.deleteTransaction('${tx.id}')" class="ml-2 p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                      </button>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `).join('');
        }

        lucide.createIcons();
      },

      renderAddForm: () => {
        // User Switcher
        document.getElementById('add-user-switcher').innerHTML = `
          <button onclick="app.setFormUser('user1')" class="flex-1 py-2 px-3 rounded-xl border flex items-center justify-center gap-2 transition-all ${state.formUser === 'user1' ? 'border-blue-500 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 text-gray-500'}">
            <i data-lucide="user" class="w-4 h-4"></i> ${state.users['user1'].name}
          </button>
          <button onclick="app.setFormUser('user2')" class="flex-1 py-2 px-3 rounded-xl border flex items-center justify-center gap-2 transition-all ${state.formUser === 'user2' ? 'border-pink-500 bg-pink-50 text-pink-700 shadow-sm' : 'border-gray-200 text-gray-500'}">
            <i data-lucide="user" class="w-4 h-4"></i> ${state.users['user2'].name}
          </button>
        `;

        // Type Buttons
        const btnExp = document.getElementById('btn-type-expense');
        const btnInc = document.getElementById('btn-type-income');
        const amountInput = document.getElementById('form-amount');
        const submitBtn = document.getElementById('btn-submit-tx');

        if (state.formType === 'expense') {
          btnExp.className = "flex-1 py-2 rounded-lg font-medium transition-all bg-white shadow-sm text-rose-600";
          btnInc.className = "flex-1 py-2 rounded-lg font-medium transition-all text-gray-500 hover:text-gray-700";
          amountInput.className = "text-5xl font-bold text-center w-full bg-transparent border-b-2 focus:outline-none focus:border-gray-800 pb-2 transition-colors text-rose-600";
          submitBtn.className = "w-full py-4 rounded-2xl font-bold text-white text-lg shadow-lg hover:opacity-90 transition-opacity bg-rose-600 shadow-rose-600/30";
        } else {
          btnExp.className = "flex-1 py-2 rounded-lg font-medium transition-all text-gray-500 hover:text-gray-700";
          btnInc.className = "flex-1 py-2 rounded-lg font-medium transition-all bg-white shadow-sm text-emerald-600";
          amountInput.className = "text-5xl font-bold text-center w-full bg-transparent border-b-2 focus:outline-none focus:border-gray-800 pb-2 transition-colors text-emerald-600";
          submitBtn.className = "w-full py-4 rounded-2xl font-bold text-white text-lg shadow-lg hover:opacity-90 transition-opacity bg-emerald-600 shadow-emerald-600/30";
        }

        // Category Grid
        const cats = state.formType === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
        document.getElementById('add-category-grid').innerHTML = cats.map(cat => {
          const isSel = state.formCategory === cat.id;
          return `
            <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="app.setFormCategory('${cat.id}')">
              <div class="w-14 h-14 rounded-2xl flex items-center justify-center transition-all ${isSel ? cat.color + ' ring-2 ring-offset-2 ring-current scale-110 shadow-md' : 'bg-gray-100 text-gray-400'}">
                <i data-lucide="${cat.icon}" class="w-6 h-6"></i>
              </div>
              <span class="text-xs font-medium mt-1 ${isSel ? 'text-gray-900' : 'text-gray-500'}">${cat.name}</span>
            </div>
          `;
        }).join('');

        lucide.createIcons();
      }
    };

    // Run the app!
    app.init();
  </script>
</body>
</html>
